ve. These characteristics are known to affect the diffuse spectral reflectance of the tissue. Objective: The main focus of this work is to propose a model for the aortic valve reflectance whose parameters can be employed as features capable of discriminating distinct levels of tissue thickness and disorganization. Methods: The data obtained from aortic valve reflectance show a S-type curve. Therefore, the modeling hypothesis is that the aortic valve stenosis generates a sigmoidal behavior at the reflectance spectroscopy. The mathematical modeling was obtained by a sigmoidal approaching and Euler methodology applied. Results: The results show the successful application of the model in the investigation of heart valve tissues with distinct characteristics. Conclusion: The solutions of this equation define parameters that can be interpreted quantitatively helping to discriminate the stenosis process in aortic valve predictable for different cases proposed in this study."},{"ano":2012,"titulo":"Glicemical Analysis of Human Blood Serum Using FT-Raman: A New Approach","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"PHOTOMEDICINE AND LASER SURGERY","qualis":"B4","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1089/pho.2012.3238","doi":"10.1089/pho.2012.3238","resumo":"BACKGROUND DATA: Fourier transform Raman spectroscopy (FT-Raman) is a noninvasive diagnostic tool largely applied to the analysis of biological fluids and tissues. METHODS: We examined the variation of carbohydrate concentration in human blood during 180 min relative to 29 spectra of patients split into four categories: hypoglycemic, healthy, threshold, and diabetic. The main bands monitored were placed in 960, 1030, 1091, 1128, and 1205 cm(-1). These bands were respectively attributed to C-O, C-C (stretching), C-O-H and C-O-C of carbohydrates. In this study, the Raman scattering signal of the all the blood samples was collected during 360 sec. The calculated correlation coefficient (R) between the concentration of carbohydrates and the Raman intensity was 0.923. CONCLUSIONS: The obtained results are reasonable according to classical biochemical analysis. Our proposed FT-Raman-based method was shown to be suitable for the monitoring of carbohydrate concentration in human blood, and presented some advantages over classical biochemical methods, such as real-time analysis, required small sample volume, and was nondestructive, and the samples did not need any previous treatment."},{"ano":2012,"titulo":"Radical intermediates in the Zn-promoted Barbier-type alkylation of diphenyl diselenide in aqueous medium","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"TETRAHEDRON LETTERS","qualis":"B1","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1016/j.tetlet.2012.09.063","doi":"10.1016/j.tetlet.2012.09.063","resumo":""},{"ano":2012,"titulo":"Óleo residual de frituras: uma abordagem interdisciplinar na perspectiva da educação ambiental na educação básica","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"EDUCAÇÃO AMBIENTAL EM AÇÃO","qualis":"Sem Qualis","area":"Educação","temas":"Educação Ambiental","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://www.revistaea.org/artigo.php?idartigo=1371","doi":"","resumo":""},{"ano":2009,"titulo":"Optimizing the Raman signal for characterizing organic samples: The effect of slit aperture and exposure time","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"SPECTROSCOPY (OTTAWA)","qualis":"Sem Qualis","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1155/2009/764524","doi":"10.1155/2009/764524","resumo":"The present work is focused on the influence of the slit aperture and time exposure of the infrared light on the Charge Coupled Device (CCD) in relation to their physical effects, in order to improve the Raman spectrum characteristics. Indeed, the alterations in slit aperture and CCD time exposure affect significantly important spectral properties, such as the spectral intensity, Signal to Noise Ratio (SNR) and band width resolution of the Raman spectra. Therefore, the present proposal has the aim of to found the optimum conditions of instrumental arrangement, involving the minimum collection time and maximum signal quality in dispersive Raman spectrometers. Samples of dehydrated human teeth and naphthalene were evaluated with a Raman dispersive spectrometer employing excitation wavelength of 830 nm in several integration times and spectrometer slit apertures. The analysis of the spectral intensity, SNR and band width of selected Raman peaks allowed to infer that these properties of a dispersive Raman spectrum depend directly of the exposure time on the detector as well as spectrograph slit aperture. It is important to register that the higher SNR was obtained with higher exposure time intervals. To the samples evaluated in the present article, the band width has lower values for slit apertures of 100–150 μm, i.e., in this aperture range the spectral resolution is maximum. On the publisher-id hand, the intensity and SNR of the Raman spectra becomes optimal for slit apertures"},{"ano":2008,"titulo":"Fluorescence and Reflectance Spectroscopy for Identification of Atherosclerosis in Human Carotid Arteries Using Principal Components Analysis.","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"PHOTOMEDICINE AND LASER SURGERY","qualis":"B4","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1089/pho.2007.2208","doi":"10.1089/pho.2007.2208","resumo":"OBJECTIVES: The aim of this work was to verify the differentiation between normal and pathological human carotid artery tissues by using fluorescence and reflectance spectroscopy in the 400- to 700-nm range and the spectral characterization by means of principal components analysis. BACKGROUND DATA: Atherosclerosis is the most common and serious pathology of the cardiovascular system. Principal components represent the main spectral characteristics that occur within the spectral data and could be used for tissue classification. MATERIALS AND METHODS: Sixty postmortem carotid artery fragments (26 non-atherosclerotic and 34 atherosclerotic with non-calcified plaques) were studied. The excitation radiation consisted of a 488-nm argon laser. Two 600-microm core optical fibers were used, one for excitation and one to collect the fluorescence radiation from the samples. The reflectance system was composed of a halogen lamp coupled to an excitation fiber positioned in one of the ports of an integrating sphere that delivered 5 mW to the sample. The photo-reflectance signal was coupled to a (1/4)-m spectrograph via an optical fiber. Euclidean distance was then used to classify each principal component score into one of two classes, normal and atherosclerotic tissue, for both fluorescence and reflectance. RESULTS: The principal components analysis allowed classification of the samples with 81% sensitivity and 88% specificity for fluorescence, and 81% sensitivity and 91% specificity for"},{"ano":2007,"titulo":"Effect of hydroalcoholic extract of Zingiber officinalis rhizomes on LPS-induced rat airway hyperreactivity and lung inflammation","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"PROSTAGLANDINS, LEUKOTRIENES AND ESSENTIAL FATTY ACIDS","qualis":"A3","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1016/j.plefa.2007.08.008","doi":"10.1016/j.plefa.2007.08.008","resumo":""},{"ano":2005,"titulo":"O papel do professor na construção discursiva da argumentação em sala de aula","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"PSICOLOGIA: REFLEXÃO E CRÍTICA (UFRGS. IMPRESSO)","qualis":"A1","area":"Educação","temas":["Argumentação","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1590/s0102-79722005000300009","doi":"10.1590/s0102-79722005000300009","resumo":"A natureza canônica dos referentes do discurso de sala de aula, a relação assimétrica professor-aluno e a previsibilidade dos resultados das discussões parecem tornar a sala de aula um espaço pouco propício à argumentação. Entretanto, reconhecendo a importância desta como recurso didático, o presente artigo discute sua construção em situações instrucionais. A tese central é que ações discursivas, nos planos pragmático, argumentativo e epistêmico, implementam a argumentação em sala de aula. Dois grupos de discussão da quinta série são analisados, um gerido pelos alunos e outro mediado pela professora. Os resultados mostram que ações facilitadoras da emergência e sustentação da argumentação surgem nos dois grupos, porém, ações que aproximam as conclusões dos alunos do conhecimento convencionalizado dependem prioritariamente da mediação da professora."},{"ano":2003,"titulo":"Reductive Coupling Reaction of Benzil, Allyl and Alkyl Halides in Aqueous Medium Promoted by Zinc","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"JOURNAL OF BRAZILIAN CHEMICAL SOCIETY","qualis":"Sem Qualis","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1590/s0103-50532003000300015","doi":"10.1590/s0103-50532003000300015","resumo":"Organic halides undergo reductive dimerization (Wurtz-type coupling) promoted by zinc at room temperature in aqueous medium. The reaction yields are strongly enhanced by copper catalysis. This coupling procedure provides an efficient and simple method for the homocoupling of benzylic and allylic bromides and primary alkyl iodides."},{"ano":2003,"titulo":"Using the laser-induced fluorescence spectroscopy in the differentiation between normal and neoplastic human breast tissue","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"LASERS IN MEDICAL SCIENCE","qualis":"A2","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1007/s10103-003-0271-9","doi":"10.1007/s10103-003-0271-9","resumo":""}];

</script>
<script>
const A = window.GEPAED_ARTIGOS || [];
const META = window.GEPAED_META || {};
const norm = s => (s||"").toString().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const hi = q => ["A1","A2"].includes(q);
const arr = x => x==null?[]:Array.isArray(x)?x:[x];   // R auto_unbox vira escalar em listas de 1 item
A.forEach(a=>{["autores","estudantes","temas","disciplina"].forEach(k=>a[k]=arr(a[k]))});
A.forEach((a,i)=>{a._i=i;a._s=norm([a.titulo,a.autores.join(" "),a.estudantes.join(" "),a.periodico,a.temas.join(" "),a.disciplina.join(" ")].join(" "))});

// ---- estado ----
let state={view:"home",facet:null,filters:{busca:"",temas:new Set(),area:new Set(),tipo:new Set(),idioma:new Set(),disciplina:new Set(),autores:new Set(),ano:new Set()},sort:"ano-desc"};
const FACETS={
  temas:{label:"Tema",field:a=>a.temas,desc:"Linhas temáticas da produção"},
  autores:{label:"Autor",field:a=>(a.autores||[]).concat(a.estudantes||[]),desc:"Pesquisadores e estudantes"},
  ano:{label:"Ano",field:a=>[String(a.ano)],desc:"Linha do tempo da produção"},
  area:{label:"Área",field:a=>a.area?[a.area]:[],desc:"Campo do conhecimento"}
};
const app=document.getElementById("app");
document.getElementById("foot-count").textContent=A.length+" artigos · "+META.ano_min+"–"+META.ano_max;

const ICON={
 temas:'<svg width=22 height=22 fill=none stroke=currentColor stroke-width=1.7><path d="M3 7l8-4 8 4-8 4z"/><path d="M3 12l8 4 8-4M3 16.5l8 4 8-4" opacity=.5/></svg>',
 autores:'<svg width=22 height=22 fill=none stroke=currentColor stroke-width=1.7><circle cx=11 cy=7 r=3.4/><path d="M4 19c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>',
 ano:'<svg width=22 height=22 fill=none stroke=currentColor stroke-width=1.7><rect x=3.5 y=5 width=15 height=14 rx=2.5/><path d="M3.5 9h15M8 3v4M14 3v4"/></svg>',
 area:'<svg width=22 height=22 fill=none stroke=currentColor stroke-width=1.7><rect x=3.5 y=3.5 width=6.5 height=6.5 rx=1.5/><rect x=12 y=3.5 width=6.5 height=6.5 rx=1.5/><rect x=3.5 y=12 width=6.5 height=6.5 rx=1.5/><rect x=12 y=12 width=6.5 height=6.5 rx=1.5/></svg>',
 search:'<svg width=20 height=20 fill=none stroke=currentColor stroke-width=2><circle cx=9 cy=9 r=6/><path d="M14 14l5 5"/></svg>'
};

// ---- HOME ----
function goHome(){state.view="home";render();window.scrollTo(0,0)}
function homeHTML(){
 const counts=Object.fromEntries(Object.keys(FACETS).map(k=>[k,new Set(A.flatMap(FACETS[k].field)).size]));
 return `
 <section class="hero"><div class="wrap fade">
   <span class="eyebrow">Argumentação na Educação</span>
   <h1>Biblioteca de produção<br>científica do GEPAEd</h1>
   <p class="lead">Explore os artigos publicados pelo grupo: navegue por tema, autor ou ano, refine com filtros e acesse cada trabalho na fonte.</p>
   <div class="search">${ICON.search}
     <input id="q" placeholder="Buscar por título, autor, periódico ou tema…" onkeydown="if(event.key==='Enter')doSearch()">
     <button onclick="doSearch()">Buscar</button>
   </div>
   <div class="stats">
     <div class="stat"><b>${META.n_artigos}</b><span>artigos em periódicos</span></div>
     <div class="stat"><b>${META.n_pesquisadores}</b><span>pesquisadores</span></div>
     <div class="stat"><b>${META.ano_min}–${META.ano_max}</b><span>período coberto</span></div>
     <div class="stat"><b>${META.n_periodicos}</b><span>periódicos</span></div>
   </div>
 </div></section>
 <section class="section"><div class="wrap">
   <h2>Por onde começar?</h2><p class="sub">Escolha um caminho de navegação. As opções se abrem conforme você avança.</p>
   <div class="modes">${Object.keys(FACETS).map(k=>`
     <button class="mode fade" onclick="openMode('${k}')">
       <span class="cnt">${counts[k]}</span>
       <div class="ic">${ICON[k]}</div>
       <h3>Por ${FACETS[k].label}</h3><p>${FACETS[k].desc}</p>
     </button>`).join("")}</div>
 </div></section>
 <section class="section" id="how"><div class="wrap">
   <h2>Como usar</h2><p class="sub">Três passos simples.</p>
   <div class="how">
     <div class="step fade"><div class="n">1</div><div><h4>Escolha um caminho</h4><p>Comece por tema, autor, ano ou área — ou use a busca livre.</p></div></div>
     <div class="step fade"><div class="n">2</div><div><h4>Refine</h4><p>Combine filtros na lateral para chegar exatamente no que procura.</p></div></div>
     <div class="step fade"><div class="n">3</div><div><h4>Acesse ou exporte</h4><p>Clique num artigo para ver o resumo e o link, ou exporte a seleção.</p></div></div>
   </div>
 </div></section>`;
}

// ---- FACET (valores de uma dimensão) ----
function openMode(f){state.view="facet";state.facet=f;render();window.scrollTo(0,0)}
function facetHTML(){
 const f=FACETS[state.facet];
 const m={};A.forEach(a=>f.field(a).forEach(v=>{if(v&&v!=="")m[v]=(m[v]||0)+1}));
 let items=Object.entries(m);
 items.sort(state.facet==="ano"?(a,b)=>b[0]-a[0]:(a,b)=>b[1]-a[1]);
 return `<div class="wrap">
   <div class="crumb"><button onclick="goHome()">Início</button><span class="sep">›</span><span>Por ${f.label}</span></div>
   <section class="section" style="padding-top:6px"><h2>Explorar por ${f.label.toLowerCase()}</h2>
   <p class="sub">${items.length} opções · clique para ver os artigos.</p>
   <div class="facet-grid">${items.map(([v,c])=>`
     <button class="facet fade" onclick="pickFacet('${state.facet}',${JSON.stringify(v).replace(/"/g,'&quot;')})">
       <span class="fn">${v}</span><span class="fc">${c}</span></button>`).join("")}</div>
   </section></div>`;
}
function pickFacet(f,v){
 Object.values(state.filters).forEach(x=>x.clear&&x.clear());state.filters.busca="";
 const map={temas:"temas",area:"area",ano:"ano",autores:"autores"};
 state.filters[map[f]].add(v);state.view="results";render();window.scrollTo(0,0);
}
function doSearch(){const q=document.getElementById("q").value;clearFilters();state.filters.busca=q;state.view="results";render();window.scrollTo(0,0)}
function clearFilters(){state.filters.busca="";["temas","area","tipo","idioma","disciplina","autores","ano"].forEach(k=>state.filters[k].clear())}

// ---- RESULTS ----
function matches(a){
 const f=state.filters;
 if(f.busca&&!a._s.includes(norm(f.busca)))return false;
 if(f.temas.size&&!(a.temas||[]).some(t=>f.temas.has(t)))return false;
 if(f.disciplina.size&&!(a.disciplina||[]).some(t=>f.disciplina.has(t)))return false;
 if(f.area.size&&!f.area.has(a.area))return false;
 if(f.tipo.size&&!f.tipo.has(a.tipo))return false;
 if(f.idioma.size&&!f.idioma.has(a.idioma))return false;
 if(f.ano.size&&!f.ano.has(String(a.ano)))return false;
 if(f.autores.size&&!((a.autores||[]).concat(a.estudantes||[])).some(t=>f.autores.has(t)))return false;
 return true;
}
function facetCounts(field,base){const m={};base.forEach(a=>field(a).forEach(v=>{if(v&&v!=="")m[v]=(m[v]||0)+1}));return m}
function fgroup(title,key,field,opts){
 const sel=state.filters[key];
 const entries=Object.entries(opts).sort(key==="ano"?(a,b)=>b[0]-a[0]:(a,b)=>b[1]-a[1]);
 if(!entries.length)return"";
 return `<details class="fgroup" ${sel.size?'open':''}><summary>${title}${sel.size?` <span style="color:var(--gold)">(${sel.size})</span>`:''}</summary>
  <div class="fopts">${entries.map(([v,c])=>`<label class="fopt"><input type="checkbox" ${sel.has(v)?'checked':''} onchange="toggleF('${key}',${JSON.stringify(v).replace(/"/g,'&quot;')})">${v}<span class="oc">${c}</span></label>`).join("")}</div></details>`;
}
function toggleF(key,v){const s=state.filters[key];s.has(v)?s.delete(v):s.add(v);render()}
function resultsHTML(){
 const list=A.filter(matches);
 list.sort((a,b)=> state.sort==="ano-asc"?a.ano-b.ano : state.sort==="qualis"?(qrank(a.qualis)-qrank(b.qualis)) : b.ano-a.ano);
 const base=A; // contagens sobre o total para orientar
 const chips=[];
 ["temas","disciplina","area","tipo","idioma","autores","ano"].forEach(k=>state.filters[k].forEach(v=>chips.push([k,v])));
 if(state.filters.busca)chips.unshift(["busca",state.filters.busca]);
 return `<div class="wrap">
  <div class="crumb"><button onclick="goHome()">Início</button><span class="sep">›</span><span>Resultados</span></div>
  <div class="results">
   <aside class="filters">
     ${fgroup("Tema","temas",a=>a.temas,facetCounts(a=>a.temas,base))}
     ${fgroup("Disciplina","disciplina",a=>a.disciplina,facetCounts(a=>a.disciplina,base))}
     ${fgroup("Área","area",a=>a.area?[a.area]:[],facetCounts(a=>a.area?[a.area]:[],base))}
     ${fgroup("Tipo","tipo",a=>a.tipo?[a.tipo]:[],facetCounts(a=>a.tipo?[a.tipo]:[],base))}
     ${fgroup("Idioma","idioma",a=>a.idioma?[a.idioma]:[],facetCounts(a=>a.idioma?[a.idioma]:[],base))}
     ${fgroup("Autor","autores",a=>(a.autores||[]).concat(a.estudantes||[]),facetCounts(a=>(a.autores||[]).concat(a.estudantes||[]),base))}
     ${fgroup("Ano","ano",a=>[String(a.ano)],facetCounts(a=>[String(a.ano)],base))}
     <button class="clearf" onclick="clearFilters();render()">↺ Limpar filtros</button>
   </aside>
   <div>
     <div class="rhead">
       <span class="cnt">${list.length} artigo${list.length!=1?'s':''}</span>
       <div class="tools">
         <select onchange="state.sort=this.value;render()">
           <option value="ano-desc" ${state.sort==='ano-desc'?'selected':''}>Mais recentes</option>
           <option value="ano-asc" ${state.sort==='ano-asc'?'selected':''}>Mais antigos</option>
           <option value="qualis" ${state.sort==='qualis'?'selected':''}>Maior Qualis</option>
         </select>
         <button class="exp" onclick="exportCSV()">↓ Exportar CSV</button>
       </div>
     </div>
     ${chips.length?`<div class="chips">${chips.map(([k,v])=>`<span class="chip">${v}<button onclick="rmChip('${k}',${JSON.stringify(v).replace(/"/g,'&quot;')})">×</button></span>`).join("")}</div>`:''}
     ${list.length?`<div class="cards">${list.map(cardHTML).join("")}</div>`:`<div class="empty">Nenhum artigo encontrado. Tente remover algum filtro.</div>`}
   </div>
  </div></div>`;
}
function qrank(q){return {"A1":1,"A2":2,"A3":3,"A4":4,"B1":5,"B2":6,"B4":7,"C":8}[q]||9}
function rmChip(k,v){if(k==="busca")state.filters.busca="";else state.filters[k].delete(v);render()}
function cardHTML(a){
 return `<article class="art fade" onclick="this.classList.toggle('open')">
   <div class="top"><span class="yr">${a.ano}</span><span class="qbadge ${hi(a.qualis)?'hi':''}">${a.qualis}</span></div>
   <h3>${a.titulo}</h3>
   <div class="au">${(a.autores||[]).join(" · ")||"—"}</div>
   <div class="pe">${a.periodico||""}</div>
   <div class="tags">${(a.temas||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}${a.disciplina&&a.disciplina.length?`<span class="tag alt">${a.disciplina.join(", ")}</span>`:''}</div>
   <div class="detail">
     ${a.resumo?`<p>${a.resumo.slice(0,420)}${a.resumo.length>420?'…':''}</p>`:'<p style="color:var(--muted)">Resumo não disponível.</p>'}
     ${a.estudantes&&a.estudantes.length?`<div class="meta"><b>Estudantes co-autores:</b> ${a.estudantes.join(", ")}</div>`:''}
     <div class="meta"><b>Tipo:</b> ${a.tipo||"—"} · <b>Idioma:</b> ${a.idioma} · <b>Área:</b> ${a.area||"—"}</div>
     ${a.doi?`<div class="meta"><b>DOI:</b> ${a.doi}</div>`:''}
     ${a.link?`<a class="go" href="${a.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Acessar artigo →</a>`:''}
   </div>
 </article>`;
}
function exportCSV(){
 const list=A.filter(matches);
 const cols=["ano","titulo","autores","periodico","qualis","area","temas","disciplina","tipo","idioma","doi","link"];
 const esc=v=>'"'+String(Array.isArray(v)?v.join("; "):v||"").replace(/"/g,'""')+'"';
 const csv=[cols.join(",")].concat(list.map(a=>cols.map(c=>esc(a[c])).join(","))).join("\n");
 const b=new Blob(["﻿"+csv],{type:"text/csv"});const u=URL.createObjectURL(b);
 const x=document.createElement("a");x.href=u;x.download="biblioteca_gepaed.csv";x.click();URL.revokeObjectURL(u);
}
function scrollHow(){if(state.view!=="home"){goHome();setTimeout(()=>document.getElementById("how")?.scrollIntoView(),60)}else document.getElementById("how")?.scrollIntoView()}

function render(){
 app.innerHTML = state.view==="home"?homeHTML() : state.view==="facet"?facetHTML() : resultsHTML();
}
render();
</script>
</body>
</html>
