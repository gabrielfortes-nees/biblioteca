 body image. The results suggest that fat body prejudice images in the memes operate in the level of persuasiveness of the audience of certain rationality through argument schemes easily recognizable by an audience."},{"ano":2022,"titulo":"Studying argumentation and education in South America: what has been advanced and what lies ahead","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"ARGUMENTATION AND ADVOCACY","qualis":"Sem Qualis","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Teórico","idioma":"Inglês","link":"https://doi.org/10.1080/10511431.2022.2138174","doi":"10.1080/10511431.2022.2138174","resumo":"With this paper, we aim to present what has been developed so far in the field of argumentation and education in South America to the best of our knowledge. However, we also aim to anticipate new trends that will arise from the challenges South American democracies face right now, and the role of collective reasoned discussion in tackling them. Traditionally argumentation studies have been proposed within three broad areas of research and practice. First, argue to learn, as the uses of argumentation practices to develop conceptual knowledge in different domains of education. Second, learn to argue by promoting argumentative practices to develop argumentative and thinking skills. Third, teacher professional development enables teachers to enact argumentation in their classrooms. From this scenario, we argue that three interrelated branches of research are the future ahead of us: studies of argumentation and citizen education using deliberative practices, cultivating virtuous intellectual habits, and the rise of deliberative teaching focused on collaborative settings designed to empower democratic values (diversity, equality, and participation). We conclude by stating that South America has helped the advancement of argumentation theory, but we still have a road ahead in developing more spaces for democratic participation."},{"ano":2022,"titulo":"UMA INVESTIGAÇÃO SOBRE A PERCEPÇÃO DE PROFESSORES COM RELAÇÃO AO ENSINO REMOTO EMERGENCIAL DE MATEMÁTICA","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REVISTA PARANAENSE DE EDUCAÇÃO MATEMÁTICA","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.33871/22385800.2022.11.24.244-266","doi":"10.33871/22385800.2022.11.24.244-266","resumo":"\"Esta pesquisa teve o objetivo de identificar aspectos das práticas de ensino de professores que lecionaram Matemática durante certo período da pandemia da COVID-19, particularmente os recursos e as dinâmicas utilizados no ensino remoto emergencial, bem como investigar as percepções desses professores sobre os aspectos positivos e negativos dessa utilização. Para isso, elaborou-se um questionário online que foi respondido por cem professores. A partir da análise qualitativa dos dados, inspirada na análise de conteúdo de Laurence Bardin, concluiu-se, dentre outros, que: os professores utilizaram diferentes estratégias para se aproximar dos alunos, mesmo que remotamente; o acesso às atividades e aulas não foi uniforme pelos alunos; metodologias próprias do ensino híbrido foram utilizadas e houve a percepção, por parte dos docentes, da necessidade de formação continuada referente a tecnologias digitais. Dessa forma, a maioria dos participantes reconheceu a importância do uso de recursos e dinâmicas do ensino remoto emergencial no retorno do ensino presencial.\""},{"ano":2022,"titulo":"Uma investigação sobre percepções de professores que ensinam Matemática em relação às práticas avaliativas durante o ensino remoto emergencial","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REVISTA DE EDUCAÇÃO MATEMÁTICA","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Formação de Professores","Metodologias Ativas e Tecnologia","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.37001/remat25269062v19id668","doi":"10.37001/remat25269062v19id668","resumo":"Este artigo é parte de uma pesquisa mais ampla que teve como objetivo identificar aspectos das práticas de ensino de professores que lecionaram Matemática durante certo período da pandemia da Covid-19. Em particular, neste estudo investigam-se as práticas avaliativas desses docentes, assim como, as suas percepções sobre os pontos positivos e negativos dessas práticas e as possíveis alterações que eles pretendem implementar no retorno do ensino presencial. Assim, elaborou-se um questionário online que foi respondido por cem professores. Para a análise qualitativa dos dados, adotou-se a análise de conteúdo de Laurence Bardin. A partir das respostas dos professores, os principais resultados foram: a reprodução de estratégias avaliativas do ensino presencial para o ensino remoto; a ausência de pontos positivos da avaliação durante o ensino remoto; a não intenção de manutenção das tecnologias digitais para a avaliação no retorno às aulas presenciais. Por fim, observou-se que o ensino remoto serviu para alguns como um meio de ressignificação da avaliação em Matemática."},{"ano":2022,"titulo":"Uso do jogo didático -Adivinha Qual?- como evento propício à revisitação do erro e da tomada de consciência de conceitos de química orgânica","autores":"Jose Ayron Lira dos Anjos","estudantes":["João Paulo Silva","Paula Eduarda Nunes da Silva"],"periodico":"REVISTA BRASILEIRA DE ENSINO DE CIÊNCIA E TECNOLOGIA","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Metacognição e Autorregulação","Metodologias Ativas e Tecnologia","Desenvolvimento e Linguagem","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.3895/rbect.v15n1.14786","doi":"10.3895/rbect.v15n1.14786","resumo":"Buscando estimular alternativas que se contraponham a uma realidade de ensino que leva os estudantes brasileiros, sobretudo de escolas públicas, a um conhecimento deficitário a Teachers College-Columbia University em parceria com a Fundação Lemann investiu no fortalecimento da atuação de pesquisadores brasileiros lançando o edital “Researching Teaching and Learning: An Equity Imperative for Teacher Education”. Contemplado nesse edital, o Núcleo de Investigações, Desenvolvimento e Estudo de Jogos no Ensino (NIDEJE) se propôs a investigar como as situações de interação discursiva propiciadas pelo uso de jogos didáticos podem ser um fator de mudança de um cenário de ensino, em que dúvidas e erros são desconsiderados como oportunidades de (re)significação de entendimentos. Para tal foi aplicado o jogo didático “Adivinha Qual?”, em uma escola da rede pública de ensino médio do agreste pernambucano, sendo a primeira aplicação do jogo didático com a participação exclusiva de estudantes que apresentavam dificuldades no conteúdo de funções orgânicas e a segunda aplicação com grupos compostos com alguns estudantes que apresentavam dificuldades e outros que tinham um melhor rendimento escolar na disciplina de química. A externalização dos pensamentos dos alunos em seus planejamentos, discussões, e reflexões ocorridas no decorrer do jogo, foram registradas e posteriormente analisadas por meio da análise microgenética. Deste modo, analisamos as interações discursivas propiciadas a partir"},{"ano":2021,"titulo":"A sucessão florestal e a arquitetura vegetal influenciam a herbivoria em Cenostigma pyramidale em Floresta Tropical Sazonal Seca?","autores":"José Antônio Bezerra de Oliveira","estudantes":"Sandrielly Almeida Lins da Silva","periodico":"JOURNAL OF ENVIRONMENTAL ANALYSIS AND PROGRESS","qualis":"B2","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.24221/jeap.6.4.2021.3616.352-362","doi":"10.24221/jeap.6.4.2021.3616.352-362","resumo":"A herbivoria pode ser influenciada pelas características defensivas vegetais e pelo terceiro nível trófico bem como pela arquitetura da planta. A Caatinga possui áreas com diferentes idades de regeneração natural após abandono. O objetivo foi avaliar se o estádio sucessional de regeneração e arquitetura vegetal influenciam a herbivoria. Cenostigma pyramidale foi usada como planta modelo por ocorrer nos três estádios sucessionais (inicial, intermediário e tardio). Foram amostrados insetos herbívoros e aranhas associados e mensuradas as taxas de herbivoria foliar, a arquitetura vegetal, os índices de esclerofilia. Foram coletados um total 241 insetos herbívoros de 21 morfoespécies e 116 aranhas. A abundância total de insetos foi afetada negativamente pela estação seca. A taxa de herbivoria e abundância de herbívoros foi maior no estádio inicial, no entanto o número de aranhas foi menor e taxa de área foliar perdida maior no estádio intermediário. A abundância de aranhas afetou negativamente as taxas de herbivoria. A biomassa de parte aérea apresentou uma relação positiva com a abundância de insetos sugadores. Assim, pode-se prever que o estágio sucessional, a arquitetura vegetal e predadores aracnídeos podem estar relacionados com a herbivoria em florestas tropicais sazonalmente secas."},{"ano":2021,"titulo":"ARGUMENTAÇÃO NO ENSINO DE MATEMÁTICA: UM CAMINHO A DEBATIBILIDADE","autores":"Tais de Oliveira Silva","estudantes":[],"periodico":"EXPERIÊNCIAS EM ENSINO DE CIÊNCIAS (UFRGS)","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Teórico","idioma":"Português","link":"https://fisica.ufmt.br/eenciojs/index.php/eenci/article/download/808/779","doi":"","resumo":"A argumentacao e concebida como estrategia didatica potencialmente discursiva e util para o ensino das ciencias. Objetivando analisar seu impacto na constituicao conceitual dos conteudos matematicos, bem como sua potencialidade na formacao critica e reflexiva dos alunos do 6° ano do ensino fundamental, elaborou-se um problema, por meio da pesquisa acao, referente aos numeros racionais, no qual os estudantes tinham a incumbencia de soluciona-lo durante um debate. O problema de acao consistia na discussao acerca da viabilidade de se abrir um supermercado cujos precos estivessem em numeros fracionarios e decimais. Com base nas analises, foi possivel identificar que a atividade promoveu a construcao coletiva do conhecimento conceitual matematico, alem de possibilitar o progresso dos discentes em habilidades argumentativas, cognitivas, reflexivas e critica."},{"ano":2021,"titulo":"Argumentação na sala de aula: refletindo criticamente sobre a descriminalização do aborto em uma vivência de prática argumentativa","autores":["Kátia Calligaris Rodrigues","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":"Brunna Stephanye Macêdo Coelho de Lima","periodico":"EDUCAÇÃO ON-LINE (PUCRJ)","qualis":"A4","area":"Educação","temas":["Argumentação","Metacognição e Autorregulação","Formação de Professores","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.36556/eol.v16i37.829","doi":"10.36556/eol.v16i37.829","resumo":"O objetivo do presente estudo foi analisar a potencialidade argumentativa de uma prática pedagógica e seu alcance em promover uma reflexão crítica, típica de um funcionamento metacognitivo. Partindo de uma compreensão da argumentação como um recurso discursivo de natureza dialógica, dialética e epistêmica, uma prática pedagógica argumentativa sobre a descriminalização do aborto foi aplicada em uma turma de formação inicial de professores da Universidade Federal de Pernambuco (UFPE). As análises denotaram a presença dos elementos de um ciclo argumentativo – argumento (A), contra-argumento (CA) e resposta (R), mostrando assim a possibilidade de fazer emergir a argumentação em sala de aula, a partir de uma prática pedagógica intencionalmente elaborada para esse fim. Diferentes formas de monitoramento do pensamento - mantenedora, elaboradora e reconstrutora - também foram encontradas nas análises. O monitoramento do pensamento é um movimento que caracteriza um funcionamento metacognitivo, por levar os indivíduos a refletirem sobre seus próprios pensamentos. Nesse sentido, foi possível concluir que a construção de conhecimento ocorrida por via da argumentação se deu de forma crítica e reflexiva. O objetivo do presente estudo foi analisar a potencialidade argumentativa de uma prática pedagógica e seu alcance em promover uma reflexão crítica, típica de um funcionamento metacognitivo. A prática pedagógica argumentativa sobre a descriminalização do aborto foi aplicada em uma turma de"},{"ano":2021,"titulo":"CONTRIBUIÇÕES DE UMA PROPOSTA DIDÁTICA NA PERSPECTIVA DA EDUCAÇÃO CIENTÍFICA BASEADA EM PROJETO, A PARTIR DA TEMÁTICA DA HIPERTENSÃO ARTERIAL","autores":"Jose Ayron Lira dos Anjos","estudantes":["Daniela Maria Do Espirito Santo e Silva","Maria Maciel Rocha dos Anjos"],"periodico":"EXPERIÊNCIAS EM ENSINO DE CIÊNCIAS (UFRGS)","qualis":"A3","area":"Educação","temas":"Desenvolvimento e Linguagem","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://fisica.ufmt.br/eenciojs/index.php/eenci/article/download/914/812","doi":"","resumo":"A Alfabetizacao Cientifica torna os individuos capacitados a ler o mundo a luz dos conhecimentos de ciencias e articula-los a outros saberes na transformacao da realidade. A Educacao Cientifica baseada em projetos parte de uma tematica pertinente aos estudantes e os instiga, por meio de acoes educativas, a significacao do conhecimento escolar e ao protagonismo na resolucao de problemas. A tematica abordada neste trabalho trata da hipertensao arterial, um problema social pouco abordado na esfera educativa de jovens e adolescentes. Assim, objetivou-se analisar as contribuicoes de uma proposta didatica de Educacao Cientifica Baseada em Projeto no desenvolvimento do pensamento cientifico em estudantes partindo da tematica da Hipertensao Arterial. Tendo como alvo alunos do 2o ano do ensino medio a metodologia foi organizada em seis momentos, que proporcionaram situacoes de aprendizagem favorecedoras da compreensao de conceitos e fazeres. A culminância do projeto foi a realizacao de uma atividade de divulgacao cientifica realizada pelos alunos, para a comunidade escolar, em que os conhecimentos construidos ao longo do processo foram mobilizados para elaborar formas de explicar a tematica da hipertensao arterial. A observacao da vivencia sugere o inicio do processo de construcao do conhecimento pelos alunos, bem como mostra indicios da alfabetizacao cientifica."},{"ano":2021,"titulo":"Deliberative Teaching as an Emergent Field: The Challenge of Articulating Diverse Research Agendas to Promote Educational Experiences for Citizenship","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"FRONTIERS IN PSYCHOLOGY","qualis":"A2","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Teórico","idioma":"Inglês","link":"https://doi.org/10.3389/fpsyg.2021.660825","doi":"10.3389/fpsyg.2021.660825","resumo":"Democracies are increasingly dependent upon sustainable citizenship, that is, active participation and engagement with the exercising of rights in a field of plural interests, often contradictory and in conflict. This type of citizenship requires not only social inclusion, habits of knowledge, and evidence-based reasoning but also argumentation skills, such as the individual and social capacity to dispute and exercise individual and social rights, and to deal peacefully with sociopolitical conflict. There is empirical evidence that educational deliberative argumentation has a lasting impact on the deep and flexible understanding of knowledge, argumentation skills, and political and citizenship education. However, these three trends of research have developed independently with insufficient synergy. Considering the relevance of deliberative education for contemporaneous democracies and citizenship, in this paper we seek to converge in a field of interlocution, calling it deliberative teaching. Our aim is to propose a way to increase the dialog and collaboration between the diffuse literature on argumentation and education, highlighting both the main theoretical and empirical gaps and challenges that remain and the possibilities to advance our knowledge and the educational impact that this integrating field could offer."},{"ano":2021,"titulo":"REFLEXÕES SOBRE O PLANEJAMENTO DE ENSINO A PARTIR DA ELABORAÇÃO DE MAPAS CONCEITUAIS","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"CURRÍCULO & DOCÊNCIA","qualis":"B2","area":"Educação","temas":"Aprendizagem Significativa","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://periodicos.ufpe.br/revistas/CD/article/view/250119","doi":"","resumo":""},{"ano":2021,"titulo":"Raciocínio Argumentativo em Matemática no PISA e na BNCC: uma investigação com estudantes da Educação Básica","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"BOLETIM GEPEM (ONLINE)","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Políticas e Equidade Educacional","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.4322/gepem.2022.008","doi":"10.4322/gepem.2022.008","resumo":"O objetivo deste artigo é investigar como os estudantes, a partir dos anos finais do Ensino Fundamental, raciocinam e argumentam sobre algumas afirmações matemáticas. Para isso, inicialmente foram analisados documentos oficiais, uma vez que se buscou articular aproximações entre a BNCC e a matriz do PISA. Inspirados em uma das questões-exemplo da matriz do PISA 2021/2022, empreendemos uma pesquisa exploratória, por meio de um questionário virtual, respondido por 52 alunos da Educação Básica. Dentre os resultados obtidos por meio de uma análise quanti-qualitativa inspirada na tipologia de prova de Nicolas Balacheff, constatou-se que os argumentos apresentados, em grande parte, eram pautados em verificações empíricas. Consideramos que a abordagem destas questões em avaliações de largo alcance estimula o trabalho pedagógico voltado à construção das habilidades de argumentar e demonstrar, importantes tanto para o desenvolvimento em Matemática como também para sua atuação num contexto social mais ampliado."},{"ano":2021,"titulo":"Survival of the kingdoms: uma proposta de jogo teatral para o ensino de Química","autores":"Jose Ayron Lira dos Anjos","estudantes":"Sandrielly Almeida Lins da Silva","periodico":"REVISTA DEBATES EM ENSINO DE QUÍMICA","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Formação de Professores","Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.29327/eneqpe2020.244975","doi":"10.29327/eneqpe2020.244975","resumo":"Pesquisas em ensino de quimica orientam que a diversidade na dinâmica dos recursos didaticos para a apresentacao dos conteudos favorece a construcao do conhecimento com significado. E justifica tal afirmacao no entendimento de que um maior nivel de interacao com o objeto pedagogico e/ou com seus pares propicia ao aluno se indagar, criar e socializar sentidos e assim construir o saber criticamente. Com esse objetivo propomos nesse trabalho o jogo didatico Survival of the Kingdoms um jogo teatral da categoria action live, que permite ao aluno acessar um ambiente que lhe desafiara a criar, investigar, compartilhar saberes, construir e (re)construir conhecimentos, inquietados pelos desafios propostos e apoiados nas reflexoes propiciadas por meio da socializacao de entendimentos. O Survival of the Kingdoms foi criado por estudantes do curso de Licenciatura em Quimica e aplicado em uma escola da Rede Estadual no interior do Agreste Pernambucano, a fim de proporcionar aos alunos do Terceiro Ano do Ensino Medio situacoes didaticas diferenciadas e estimulantes ao aprendizado. Sua jogabilidade consiste em uma perspectiva teatral construida a partir de um enredo medieval, tendo como tematica alguns conteudos de quimica organizados pelas tematicas: agua, fogo, terra e ar, voltados a uma revisao dos conteudos de quimica para o vestibular. Como principal resultado da validacao do jogo didatico observou-se uma maior interacao, e engajamento de todos os alunos participantes na tentativa de s"},{"ano":2020,"titulo":"A discussion on the concepts of goal, skill and competence in the high school BNCC","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"CURRÍCULO & DOCÊNCIA","qualis":"B2","area":"Educação","temas":"Políticas e Equidade Educacional","disciplina":[],"tipo":"Teórico","idioma":"Inglês","link":"https://periodicos.ufpe.br/revistas/CD/article/download/249557/37710","doi":"","resumo":"No Brasil, o planejamento do curriculo da Educacao Basica e sempre muito discutido por teoricos como Lopes e Macedo por exemplo, uma dessas discussoes e referente aos conceitos de objetivos, habilidade e competencias e a confusao na pratica e no uso desses conceitos. Outro alvo de criticas no campo do curriculo e o novo documento da Base Nacional Comum Curricular (BNCC), pois passou a nortear os curriculos de escolas de todo pais. Assim, este trabalho busca uma analise comparativa entre a forma como os objetivos, habilidades e competencias sao utilizadas na BNCC e como esses se apresentam nas teorias que iniciaram e ainda discutem sobre estas definicoes. Utilizando as visoes de Tyler, Perrenoud; outros autores que os sucedem, e que estabeleceremos uma relacao sobre como as definicoes apresentadas no documento da BNCC referente a esses conceitos, possibilitam o levantamento de criticas ao que hoje e exigido dos alunos de ensino basico brasileiro.\r\nPalavras-chave: Habilidades, Objetivos, Competencias, Curriculo, BNCC"},{"ano":2020,"titulo":"A resolução de problemas como organizador prévio para a Aprendizagem Significativa Crítica na Educação Básica","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"INTERFACE","qualis":"Sem Qualis","area":"Educação","temas":"Aprendizagem Significativa","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://scholar.google.com/scholar?q=A%20resolu%C3%A7%C3%A3o%20de%20problemas%20como%20organizador%20pr%C3%A9vio%20para%20a%20Aprendizagem%20Significativa%20Cr%C3%ADtica%20na%20Educa%C3%A7%C3%A3o%20B%C3%A1sica","doi":"","resumo":""},{"ano":2020,"titulo":"ARGUMENTACIÓN Y EDUCACIÓN: UN CAMPO DIVERSO, TENSIONADOY TENSIONANTE EN EMERGENCIA","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"COGENCY: JOURNAL OF REASONING AND ARGUMENTATION","qualis":"B2","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://cogency.udp.cl/index.php/cogency/article/view/353/147","doi":"","resumo":""},{"ano":2020,"titulo":"AUTORREGULAÇÃO DA APRENDIZAGEM NA ESTRATÉGIA DE ESCOLHA E RESOLUÇÃO DE PROBLEMAS EM FÍSICA: UM ESTUDO EXPLORATÓRIO","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"EXPERIÊNCIAS EM ENSINO DE CIÊNCIAS (UFRGS)","qualis":"A3","area":"Educação","temas":["Metacognição e Autorregulação","Formação de Professores","Pensamento Crítico e Reflexivo"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://fisica.ufmt.br/eenciojs/index.php/eenci/article/download/715/683","doi":"","resumo":"Esse artigo apresenta um estudo sobre a autorregulacao da aprendizagem a partir da insercao da estrategia de Escolha e Resolucao de Problemas (ERP) em um curso de formacao inicial de professores de Fisica em uma Instituicao Publica de Ensino Superior do nordeste Brasileiro. A insercao da ERP, em uma disciplina obrigatoria de Fundamentos de Fisica, teve o objetivo de provocar processos reflexivos e autorregulatorios no docente em formacao. A fim de verificar esses processos, foi elaborado e implementado um questionario de acompanhamento da estrategia de ERP, tendo como referencial teorico os estudos de Zimmerman e Pintrich para a Autorregulacao da Aprendizagem. Os resultados aqui discutidos focam em tres elementos: a motivacao, a aprendizagem e a resolucao de problemas. Os resultados apontam que a estrategia de ERP, aliada a aplicacao do questionario, promoveu uma melhora significativa desses elementos ao longo do periodo da disciplina. Ha evidencias do desenvolvimento de processos autorregulatorios especificos segundo a perspectiva de Zimmerman. Implicacoes para a formacao de professores tambem sao discutidas."},{"ano":2020,"titulo":"Argumentation in chemical teaching: Construction about the concept of atomic models","autores":"Tais de Oliveira Silva","estudantes":[],"periodico":"CURRÍCULO & DOCÊNCIA","qualis":"B2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://periodicos.ufpe.br/revistas/CD/article/download/248105/36528","doi":"","resumo":"A argumentacao e um processo dialogico que tem por finalidade a construcao do conhecimento. Logo, e compreendida como uma estrategia didatica util para o ensino de Quimica. Seu carater dialogico e sua dinâmica possibilitam desenvolver a elaboracao coletiva da aprendizagem. Por isso, torna-se ainda mais viavel sua utilizacao no ensino da Quimica devido a abstracao que essa ciencia abarca em sua essencia e que normalmente e ensinado com ilustracoes que favorecem o aparecimento de obstaculos epistemologicos. Sendo assim, este trabalho tem por objetivo investigar de que forma a argumentacao pode auxiliar os estudantes na compreensao do desenvolvimento dos modelos atomicos ao longo de debates sobre questoes cientificas, que envolvem praticas relacionadas ao processo de construcao e reformulacao de conceitos, ancoradas na perspectiva dialogicas proposta por Leitao (2011).\r\nPalavras-chave:Argumentacao,Ensinode Quimica, Modelos."},{"ano":2020,"titulo":"Argumentação e Prova em Matemática: uma análise dos itens públicos do PISA 2012","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REVISTA BAIANA DE EDUCAÇÃO MATEMÁTICA","qualis":"B1","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Políticas e Equidade Educacional","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.47207/rbem.v1i.10321","doi":"10.47207/rbem.v1i.10321","resumo":"Neste artigo, o objetivo é analisar os itens públicos do Programa Internacional de Avaliação dos Estudantes (PISA, em inglês) de 2012 que versem sobre argumentação e prova em Matemática. Estes itens exploram os três processos matemáticos (formular, empregar e interpretar), fundamentais para o desenvolvimento da capacidade de raciocinar e argumentar, e definem o letramento matemático segundo a matriz de referência do PISA. Na abordagem teórico-metodológica, recorremos a trabalhos referenciados na literatura que discutem as funções da prova, bem como apresentam outros trabalhos exploratórios envolvendo estudantes e professores. O estudo se caracteriza por uma pesquisa documental, de cunho qualitativo. No levantamento realizado na base de questões públicas disponível no site do Instituto Nacional de Estudos e Pesquisas Educacionais Anísio Teixeira (INEP), selecionamos 10 itens que atendiam a critérios previamente estabelecidos e procedemos à análise de três destes itens, um de cada processo matemático, à luz dos referenciais que discutem os papéis da prova. Os resultados mostram que os itens buscam mobilizar no estudante habilidades que tencionam o desenvolvimento do raciocínio lógico, conforme estabelecido na BNCC. A título de conclusões parciais, consideramos que a abordagem dessas questões em avaliações de largo alcance, bem como em avaliações institucionais (realizadas pela própria escola), estimula o trabalho pedagógico voltado à construção das habilidades de argumentar e d"},{"ano":2020,"titulo":"Caracterização e aplicação de uma Unidade de Ensino Potencialmente Significativa sobre Locomoção Humana","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"INTERFACE","qualis":"Sem Qualis","area":"Educação","temas":"Aprendizagem Significativa","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://scholar.google.com/scholar?q=Caracteriza%C3%A7%C3%A3o%20e%20aplica%C3%A7%C3%A3o%20de%20uma%20Unidade%20de%20Ensino%20Potencialmente%20Significativa%20sobre%20Locomo%C3%A7%C3%A3o%20Humana","doi":"","resumo":""},{"ano":2020,"titulo":"Construção de significados e ambiguidades na supervisão de estágio em psicologia","autores":"Nádia Oliveira da Silva","estudantes":[],"periodico":"PSICOLOGIA-UNIVERSIDADE DE SP-USP (IMPRESSO)","qualis":"A2","area":"Psicologia","temas":["Formação de Professores","Psicologia e Subjetividade","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.1590/0103-6564e200064","doi":"10.1590/0103-6564e200064","resumo":"Resumo Na formação de psicólogos, o tripé supervisão-estágio-ensino é fundamental para o desenvolvimento de competências profissionais. Todavia a relação estreita entre estas três esferas ocasiona, por vezes, uma compreensão nebulosa sobre a práxis concernente a cada um destes campos. À luz do dialogismo bakhtiniano e da intersubjetividade, este artigo visa a analisar a construção de significados sobre supervisão de estágio, por meio das ambiguidades que enlaçam esta atividade. Foi possível analisar que as ambiguidades permeadas pelo tripé formativo ocasionam tensões nas relações intersubjetivas, sendo balizadoras na construção de novos significados sobre a atividade de supervisão. Estes significados são tecidos pela negociação com as outridades que permeiam essa atividade formativa e pelo contexto em que são realizadas. Isto posto, estudos desta natureza propiciam uma compreensão mais ampla sobre conhecimentos teóricos/práticos concernentes ao campo da supervisão, o que pode ensejar a construção de estratégias facilitadoras na formação de psicólogos."},{"ano":2020,"titulo":"Diseño De un programa De formación Docente para el Desarrollo De conocimiento peDagógico De conteniDo De la argumentación","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"COGENCY: JOURNAL OF REASONING AND ARGUMENTATION","qualis":"B2","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.32995/cogency.v12i2.365","doi":"10.32995/cogency.v12i2.365","resumo":"Durante las ltimas dcadas, la argumentacin ha ganado importancia central como parte de los objetivos educativos del siglo XXI. Est ampliamente aceptado que la argumentacin es una caracterstica clave para el aprendizaje. Si bien se considera que los resultados de los estudiantes en el aprendizaje y el razonamiento se asocian positivamente con la argumentacin, los contextos del aula an reproducen las ideas tradicionales de enseanza-aprendizaje, tal como la pedagoga centrada en adultos, orientada al individuo y basada en el contenido. Un actor clave para cambiar esto es el profesorado, sin embargo, se sabe menos sobre cmo desarrollar el conocimiento docente de la argumentacin y cmo utilizarlo en el contexto del aula. En este estudio presentamos el primer ciclo de una de investigacin design-based dividido en cuatro fases: 1) explorar el problema; 2) disear una solucin; 3) implementar la solucin; y 4) evaluacin y rediseo. En cada fase realizamos diferentes procedimientos para una elaborar propuesta de solucin rigurosa: as, 1) presentamos una revisin bibliogrfica no exhaustiva del desarrollo profesional docente en argumentacin, 2) con ella construimos un programa de formacin docente en argumentacin;"},{"ano":2020,"titulo":"Estratégias didáticas para o ensino de resíduos sólidos nas perspectivas da Educação Ambiental Crítica e Aprendizagem Significativa Crítica","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"EDUCAÇÃO AMBIENTAL EM AÇÃO","qualis":"Sem Qualis","area":"Educação","temas":["Aprendizagem Significativa","Educação Ambiental"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://www.revistaea.org/artigo.php?idartigo=4010","doi":"","resumo":"Esse estudo objetivou elaborar estrategias para o ensino de residuos solidos, na perspectiva da Educacao Ambiental Critica, para promocao de uma aprendizagem significativa. Apos estruturacao a aplicacao das atividades para estudantes do Ensino Medio, a aprendizagem deles foi analisada via mapas conceituais."},{"ano":2020,"titulo":"JOGOS COOPERATIVOS E ARGUMENTAÇÃO: POTENCIALIDADES PARA A PROMOÇÃO DO PENSAMENTO CRÍTICO E REFLEXIVO NO ENSINO DE MATEMÁTICA","autores":["Carlos Antonio da Silva Lopes","Kátia Calligaris Rodrigues","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"REVISTA DE ENSINO DE CIÊNCIAS E MATEMÁTICA (RENCIMA)","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.26843/rencima.v11i3.2293","doi":"10.26843/rencima.v11i3.2293","resumo":"O presente artigo tem como principal objetivo discutir as potencialidades de jogos em uma perspectiva cooperativa para a promoção de processos argumentativos em sala de aula, isto pensado com o intuito de propiciar o desenvolvimento do pensamento crítico e reflexivo no ensino de Matemática. Para tanto, se optou por uma pesquisa de cunho bibliográfico para levantamento e sistematização dos conceitos acerca dos temas envolvidos na pesquisa a fim de descrever essas potencialidades educativas, e, concomitantemente, realizamos análises dos documentos curriculares oficiais (Nacionais e regionais) visando identificar o que propõem os mesmos no que concerne ao ensino da Matemática. Descrevemos que, em todos os documentos analisados, a cooperação e o pensamento crítico são propostas para o trabalho em sala de aula, e, em seguida, justificamos as correlações das possíveis potencialidades dos Jogos Cooperativos (JC) para promover os processos argumentativos de acordo com os autores pesquisados. Concluímos que o professor, por meio de ações discursivas específicas, convicto da potencialidade da Argumentação e utilizando um jogo na perspectiva cooperativa, possibilitará aos alunos tornarem-se indivíduos críticos e reflexivos."},{"ano":2020,"titulo":"Jogos Cooperativos e Argumentação: Caminhos para uma Formação Crítica e Reflexiva de Licenciandos em Matemática","autores":["Carlos Antonio da Silva Lopes","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"JORNAL INTERNACIONAL DE ESTUDOS EM EDUCAÇÃO MATEMÁTICA","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.17921/2176-5634.2020v13n3p255-266","doi":"10.17921/2176-5634.2020v13n3p255-266","resumo":"ResumoO presente artigo se propõe a analisar o impacto de um curso de extensão sobre as relações entre jogos cooperativos e argumentação para uma prática crítica e reflexiva de licenciandos de Matemática de uma Universidade Federal de ensino superior. Para cada momento do curso foram desenvolvidas atividades que permitiram que os 05 licenciandos participantes tivessem contato tanto com os pressupostos teóricos sobre os jogos cooperativos e argumentação, como também vivenciassem atividades práticas que os mobilizaram na utilização dos conhecimentos adquiridos para a construção de um jogo cooperativo-argumentativo como produto final. Ao analisar os dados pudemos concluir que os licenciandos conseguiram desenvolver suas potencialidades cooperativas e argumentativas e foram capazes de elaborar um jogo que denotou a capacidade dos mesmos de pensar em como fazer emergir e manter a argumentação em um contexto cooperativo. Assim, além do curso de extensão ter contribuído para a formação crítica e reflexiva dos licenciandos envolvidos, a experiência formativa pela qual passaram ajudou-os na promoção de situações potencializadoras de um aprendizado igualmente crítico e reflexivo em suas salas de aula.&#x0D; Palavras-chave: Argumentação. Jogos Cooperativos. Pensamento Crítico-Reflexivo. Formação Docente. Educação Matemática.&#x0D; AbstractThis article aims to analyze the impact of an extension course about the relationship between cooperative games and argumentation, in order to offer c"},{"ano":2020,"titulo":"MAPEAMENTO CONCEITUAL NA NEGOCIAÇÃO DE SIGNIFICADOS: UNINDO ASPECTOS TÉCNICOS E AÇÕES ESTIMULANTES NO ESTUDO DE CÁLCULO I","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"CAMINHOS DA EDUCAÇÃO MATEMÁTICA EM REVISTA","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://periodicos.ufpe.br/revistas/CD/article/view/250062","doi":"","resumo":""},{"ano":2020,"titulo":"Profesores: ¿qué seres humanos queremos ayudar a formar? Punto de partida para la defensa de la argumentación en la formación docente","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"REVISTA IBEROAMERICANA DE ARGUMENTACIÓN","qualis":"A2","area":"Educação","temas":["Argumentação","Metacognição e Autorregulação","Pensamento Crítico e Reflexivo"],"disciplina":[],"tipo":"Teórico","idioma":"Espanhol","link":"https://doi.org/10.15366/ria2020.20.013","doi":"10.15366/ria2020.20.013","resumo":"This text is a concern with the formation of critical-reflective citizens, belonging to a complex world that continuously imposes positions on different dilemmas. We understand that if an educator feels imbued with this unease, it will be part of his concerns to plan pedagogical practices that favor an equally critical and reflective knowledge construction. Argumentation in education has been proposed as an interesting path in this sense, directly impacting the reflection on teacher education. In a specific way, this article proposes to think about argumentation in educational environments, especially in teacher training courses in a double dimension: argue to learn and learn to argue. For this, in addition to reflections on the potential of argumentative discourse for a critical and significant construction of knowledge from a reflexive, metacognitive and self-regulating functioning, we also find here practical feasible proposals for the incorporation of argumentation in teacher education."},{"ano":2020,"titulo":"UMA ANÁLISE SOBRE O USO DA TEORIA DA APRENDIZAGEM SIGNIFICATIVA NO ENSINO DE QUÍMICA EM TRABALHOS CIENTÍFICOS","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"APRENDIZAGEM SIGNIFICATIVA EM REVISTA","qualis":"C","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Teórico","idioma":"Não informado","link":"https://www.if.ufrgs.br/asr/artigos/Artigo_ID177/v10_n1_a2020.pdf","doi":"","resumo":""},{"ano":2019,"titulo":"A ARGUMENTAÇÃO PRESENTE NA CONSTRUÇÃO DE MAPAS CONCEITUAIS COMO PROPULSORA DE UMA APRENDIZAGEM SIGNIFICATIVA CRÍTICA / THE ARGUMENTATION PRESENT IN CONSTRUCTION OF CONCEPTUAL MAPS AS DRIVER OF CRITICAL MEANINGFUL LEARNING","autores":["Raquel Cordeiro Nogueira Lima","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"DYNAMIS","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Aprendizagem Significativa","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.7867/1982-4866.2019v25n3p68-85","doi":"10.7867/1982-4866.2019v25n3p68-85","resumo":"O mapa conceitual é uma ferramenta muito utilizada no contexto educacional para apoiar o estudante na articulação do conhecimento e o professor como instrumento de avaliação. Apoiado em uma concepção de linguagem como constitutiva da cognição, este estudo intenta mostrar que o caráter inerentemente argumentativo que caracteriza a construção dos mapas conceituais contribui para que ele seja um recurso didático privilegiado na aprendizagem significativa crítica. Entendendo a argumentação como caracterizada pela justificação e negociação de perspectivas a partir de uma organização discursiva formada pela relação entre argumento, contra-argumento e resposta, ela tem sido considerada um caminho propício a um funcionamento crítico-reflexivo na construção do conhecimento. Reconhecendo essa movimentação discursiva na construção de mapas conceituais de alunos de química do ensino médio em uma escola pública da região metropoliana do Recife, as análises realizadas mostram portanto, a relação intrínseca que existe entre argumentação e aprendizagem significativa crítica."},{"ano":2019,"titulo":"ANÁLISE DO PROCESSO ARGUMENTATIVO NA CONSTRUÇÃO DE MAPAS CONCEITUAIS E SUAS RELAÇÕES COM A APRENDIZAGEM SIGNIFICATIVA CRÍTICA NO ENSINO DE CIÊNCIAS","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"CIÊNCIA & ENSINO (ONLINE)","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://www.abrapec.com/enpec/xi-enpec/anais/resumos/R2460-1.pdf","doi":"","resumo":""},{"ano":2019,"titulo":"Concepções de Docentes sobre o uso de Metodologias Ativas da Aprendizagem: Um Enfoque na Formação de Enfermeiros","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"SUSTINERE: REVISTA DE SAÚDE E EDUCAÇÃO","qualis":"A2","area":"Educação","temas":"Pensamento Crítico e Reflexivo","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.12957/sustinere.2018.36366","doi":"10.12957/sustinere.2018.36366","resumo":"As vertiginosas mudanças na conjuntura social têm posto em reflexão, de maneira contundente, os aspectos relacionados a formação profissional em enfermagem. Assim, esta discussão surge mediante a necessidade de considerar os fatores que são próprios do trabalho em saúde, tais como a relação intrínseca entre as atividades práticas e a teoria, o cuidado holístico, crítico e humanizado, visto que estes elementos são essenciais para o apropriado exercício profissional. Este trabalho objetivou investigar a percepção dos docentes do curso de graduação em enfermagem sobre a utilização e contribuição das metodologias ativas da aprendizagem no processo de formação e desenvolvimento do profissional enfermeiro. Trata-se de um estudo de natureza qualitativa de caráter exploratório-descritivo, que foi realizado com docentes de um Centro Universitário do Agreste Pernambucano. Os dados foram coletados por meio de entrevista semiestruturada, para apreciação dos dados obtidos foirealizada análise de conteúdo, seguindo o referencial teórico proposto por Minayo. Os resultados demonstraram que os docentes compreendem a relevância das metodologias ativas para a formação em enfermagem, entretanto evidenciamos não haver um planejamento de um ensino ativo, pelo professor, demonstrando afinidade com a transmissão de conteúdos, o que sinaliza a importância da atitude reflexiva constante no campo da docência em enfermagem."},{"ano":2019,"titulo":"Education, History and Scientific Culture Research Group","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"CURRÍCULO & DOCÊNCIA","qualis":"B2","area":"Educação","temas":"Ensino de Ciências e Matemática","disciplina":"Ciências (geral)","tipo":"Teórico","idioma":"Inglês","link":"https://periodicos.ufpe.br/revistas/CD/article/download/245925/35265","doi":"","resumo":""},{"ano":2019,"titulo":"El papel de los reguladores semióticos en la construcción y ejecución de un diseño instrucional argumentativo","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"COGENCY: JOURNAL OF REASONING AND ARGUMENTATION","qualis":"B2","area":"Educação","temas":["Argumentação","Metacognição e Autorregulação","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.32995/cogency.v11i1-2.321","doi":"10.32995/cogency.v11i1-2.321","resumo":"This article investigates how the semiotic tools socially shared have a role in psychological development of students enrolled in argumentative classes. The process of internalization is understood as a form of semiotic regulation, socially shared, that benefits the organization and structuring of higher mental functions. We use an argumentative instructional design inspired by the adaptation made by Leitao (2012) to the Critical Debate Model / MDC (Fuentes, 2011) to create an environment of systematic argumentation as a mediation resource for the development of reflective thinking of students. In each cycle (5 debates), the students (38) are divided into three groups, who rotate to assume the roles of protagonists, antagonistics and judges/researchers – in every cycle there are activities to teach how to argue and argue to learn school content. Hence, they are systematically stimulated to exchange points of view rationally, evaluate arguments, question positions, produce arguments and anticipate counter-arguments. The workshop where teachers stimulated the teaching of argumentation for the purpose of developing argumentative competencies were qualitatively analyzed. The semiotic-discursive analysis of 12 cases (one of the three groups) indicates that there are three levels of regulatory agents: 1) the design, 2) the instruction of the teachers, 3) the reaction (understanding) of the students. And the regulators are divided into the dimensions of knowledge construction and pr"},{"ano":2019,"titulo":"Investigação sobre o desenvolvimento do processo dedutivo nos cursos de Licenciatura em Matemática","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REVISTA DE ENSINO DE CIÊNCIAS E MATEMÁTICA (RENCIMA)","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Desenvolvimento e Linguagem","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.26843/rencima.v10i2.2333","doi":"10.26843/rencima.v10i2.2333","resumo":"Este artigo relata parte de uma pesquisa que visa investigar se os cursos de Licenciatura em Matemática preparam os futuros professores para explorar, em suas aulas, atividades que promovam o desenvolvimento do pensamento dedutivo. O trabalho foi motivado pela observação de que, em geral, os professores de Matemática não se preocupam em desenvolver a habilidade de argumentação de seus alunos e não valorizam as justificativas informais apresentadas. Esse comportamento pode ser justificado pela formação prévia desses professores. Se o licenciando não teve oportunidade de vivenciar atividades que demandam argumentação ou provas na Escola Básica, é necessário que ele tenha essa experiência durante o curso de formação de professores. No entanto, os resultados de questões discursivas do ENADE que requerem raciocínio dedutivo evidenciam um desempenho preocupante dos licenciandos nesse quesito, pois as médias das notas são, em geral, muito baixas, sendo que a maioria das respostas ficou em branco. Em algumas questões, as respostas apresentadas se baseavam em argumento de natureza empírica, apenas experimentando a validade da afirmativa para poucos exemplos. Os relatórios indicam que os estudantes não encontram nos cursos de graduação em Matemática oportunidades para superarem tais dificuldades."},{"ano":2019,"titulo":"LIBRAS na formação de professores: o vídeo como ferramenta de avaliação da aprendizagem","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"REVISTA EDUCAÇÃO, ARTES E INCLUSÃO","qualis":"A4","area":"Educação","temas":["Metacognição e Autorregulação","Formação de Professores","Avaliação e Trajetórias"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.5965/1984317815012019217","doi":"10.5965/1984317815012019217","resumo":"Este trabalho relata a análise de um conjunto de atividades didáticas de produção de vídeos em Língua Brasileira de Sinais (Libras) por estudantes de cursos de licenciatura do Núcleo de Formação Docente do Centro Acadêmico do Agreste da Universidade Federal de Pernambuco. De forma introdutória, trazemos algumas considerações sobre o lugar da Libras no contexto da educação superior no Brasil. Em seguida tratamos sobre avaliação e autorregulação no processo de ensino-aprendizagem (SILVA, 2007; PERRENOUD, 1999). Finalizando o referencial teórico, discorremos sobre aprendizagem móvel (BOTTENTUIT, 2012; Lévy, 1993). A partir da análise das respostas dos estudantes a um questionário e de dois vídeos produzidos na atividade, observamos que os principais obstáculos para a produção dos vídeos foram: vocabulário incipiente em Libras, a dificuldade em executar as expressões não-manuais e a falta de destreza com a edição dos vídeos. Em conclusão, apontamos que a atividade de produção de vídeos em Libras pode contribuir para uma melhora da prática de sinalização na língua, visto que os alunos são levados a pesquisar previamente os sinais que serão usados para a produção, trabalhando a autorregulação da aprendizagem."},{"ano":2019,"titulo":"NIDEJE SEUS OBJETIVOS E DEMANDAS FRENTE AO CENÁRIO DO USO DE JOGOS DIDÁTICOS NO BRASIL","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"CURRÍCULO & DOCÊNCIA","qualis":"B2","area":"Educação","temas":"Metodologias Ativas e Tecnologia","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://periodicos.ufpe.br/revistas/CD/article/view/245924","doi":"","resumo":""},{"ano":2018,"titulo":"A IMPORTÂNCIA DO MÉTODO: A PESQUISA QUALITATIVA NO AMBIENTE EDUCACIONAL","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"ARGUMENTOS PRÓ-EDUCAÇÃO - REVISTA DE EDUCAÇÃO DA UNIVÁS","qualis":"Sem Qualis","area":"Educação","temas":"Metodologia de Pesquisa","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://www.researchgate.net/publication/324629140","doi":"","resumo":""},{"ano":2018,"titulo":"Argumentação e demonstração em matemática: a visão de alunos e professores","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REV. TRIANGULO","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.18554/rt.v10i2.2583","doi":"10.18554/rt.v10i2.2583","resumo":"Com o objetivo de investigar a visão de alunos e professores sobre argumentação e demonstração matemática, à luz da tipologia de provas de Balacheff (1988), aplicamos um questionário a professores da Educação Básica do interior do Estado de São Paulo. A partir da análise dos questionários, selecionamos duas turmas do 9º ano do Ensino Fundamental, de professores e escolas públicas distintas que resolveram um teste para avaliar o nível de prova desses alunos. Dentre os resultados obtidos, verificou-se que, em geral, os docentes adotam como sinônimos os termos argumentação, explicação e demonstração, e isto é refletido nas resoluções dos discentes, que apresentam o nível de prova classificado como empirismo ingênuo. Acreditamos que os cursos de licenciatura devem proporcionar aos futuros professores a oportunidade de conceber a argumentação e demonstração como um recurso metodológico a ser utilizado em sala de aula, a fim de criar um ambiente favorável à exploração-investigação da matemática."},{"ano":2018,"titulo":"Considerações sobre uma avaliação diagnóstica do conceito de função à luz da Teoria dos Registros de Representações Semióticas","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"REVEMAT","qualis":"A2","area":"Educação","temas":"Avaliação e Trajetórias","disciplina":[],"tipo":"Teórico","idioma":"Português","link":"https://doi.org/10.5007/1981-1322.2017v12n2p116","doi":"10.5007/1981-1322.2017v12n2p116","resumo":"Este trabalho é um recorte de uma pesquisa de mestrado cujo objetivo é elaborar, aplicar e validar uma situação didática para o conceito de função com base na Teoria dos Registros de Representações Semióticas. Este artigo apresenta os resultados das questões em língua natural de uma avaliação diagnóstica realizada com estudantes do 1º ano do Ensino Médio de um Campus do IFPE que foram o público da pesquisa. Os dados foram analisados qualitativamente e apontam que muitos estudantes exigem uma lei algébrica para que uma relação seja função e que as ideias de relação, dependência e variação são as mais presentes na concepção de função desses estudantes."},{"ano":2018,"titulo":"Formando mediadores de argumentação: uma experiência de estágio docência","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"REVISTA PSICOLOGIA ESCOLAR E EDCUACIONAL","qualis":"A1","area":"Psicologia","temas":["Argumentação","Formação de Professores","Psicologia e Subjetividade","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.1590/2175-35392018038011","doi":"10.1590/2175-35392018038011","resumo":"Resumo Este relato de prática profissional aborda a experiência de estágio docência na formação de monitores para uma disciplina intensamente argumentativa do curso de Psicologia. Esta disciplina é fundada em princípios que visam utilizar a argumentação como auxílio para construção do conhecimento e, também, como forma de incentivo ao desenvolvimento cognitivo dos estudantes envolvidos. Para que esta disciplina seja possível é preciso o treinamento de estudantes para desempenhar o papel de monitor que por um lado participaram ativamente como mediadores da construção do conhecimento e também como aqueles que instauram o discurso argumentativo em sala de aula. Nossa experiência nos diz da importância do treinamento dos monitores como uma forma de incentivar o uso de princípios da psicologia educacional dentro da sala de aula no ensino superior abrindo uma porta para que a sala de aula se torne um ambiente desafiador e propício para o desenvolvimento de habilidades cognitivas."},{"ano":2018,"titulo":"Formação de psicólogos clínicos a partir das atitudes facilitadoras da Abordagem Centrada na Pessoa","autores":"Nádia Oliveira da Silva","estudantes":[],"periodico":"REVISTA CIENTÍFICA E TECNOLÓGICA/FUNDAÇÃO SOUSÂNDRADE DE APOIO AO DESENVOLVIMENTO DA UFMA","qualis":"Sem Qualis","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://scholar.google.com/scholar?q=Forma%C3%A7%C3%A3o%20de%20psic%C3%B3logos%20cl%C3%ADnicos%20a%20partir%20das%20atitudes%20facilitadoras%20da%20Abordagem%20Centrada%20na%20Pessoa","doi":"","resumo":""},{"ano":2018,"titulo":"O IMPACTO DA INTERFACE ENTRE A APRENDIZAGEM BASEADA EM PROBLEMAS E A ARGUMENTAÇÃO NA CONSTRUÇÃO DO CONHECIMENTO CIENTÍFICO","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"INVESTIGAÇÕES EM ENSINO DE CIÊNCIAS (ONLINE)","qualis":"A1","area":"Educação","temas":["Argumentação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.22600/1518-8795.ienci2018v23n3p82","doi":"10.22600/1518-8795.ienci2018v23n3p82","resumo":"O objetivo do presente trabalho é compreender o impacto que a interface entre a Aprendizagem Baseada em Problemas (ABP) e a argumentação desempenha para a promoção da construção do conhecimento científico. Tomamos como foco de análise, as interações dialógicas entre aluno-aluno e aluno-professor ao longo da resolução de um problema na metodologia ativa ABP, por entendermos que a configuração deste tipo de metodologia favorece o debate crítico e reflexivo de ideias. As análises foram feitas com base na perspectiva da argumentação enquanto mecanismo epistêmico e promotor do pensamento crítico e reflexivo, bem como dos pressupostos sobre os indicadores de alfabetização científica para a promoção da aprendizagem. Nossos resultados apontaram que, embora a metodologia ABP seja propícia ao desenvolvimento de interações dialógicas, por si só, não garante que a argumentação ocorra nem tampouco que os alunos expressem indicadores de alfabetização científica. Concluímos que o desenvolvimento de interações dialógicas depende muito mais do manejo do tutor através de determinadas ações discursivas, as quais fazem toda a diferença quando se pretende utilizar a argumentação para o processo de ensino e de aprendizagem."},{"ano":2017,"titulo":"Aprendizagem Significativa Crítica e Flexibilidade Cognitiva: diálogo metodológico através da construção e validação de uma ferramenta Flexquest para o ensino de Ecologia na educação básica","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"CADERNOS DE ESTUDOS E PESQUISA NA EDUCAÇÃO BÁSICA","qualis":"B2","area":"Educação","temas":["Aprendizagem Significativa","Metodologias Ativas e Tecnologia"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://periodicos.ufpe.br/revistas/cadernoscap/article/download/230849/28800","doi":"","resumo":"A aprendizagem pode se tornar potencialmente significativa quando e possivel alcancar a flexibilizacao do conhecimento por meio de ferramentas didaticas que possam articular varios contextos. Assim, este trabalho teve por objetivo estabelecer um dialogo entre a Teoria da Aprendizagem Significativa Critica e a Teoria da Flexibilidade Cognitiva. Para isso foi desenvolvida uma sequencia didatica para o ensino de Ecologia no Ensino Medio que incluiu, como estrategia, a producao e a aplicacao de uma Flexquest . Os resultados obtidos atraves da analise de mapas conceituais apontam para a reorganizacao das ideias de maneira mais critica e flexivel na estrutura cognitiva dos estudantes. Nesta direcao, e possivel concluir que a flexibilizacao do conhecimento e a utilizacao de ferramentas digitais, em sinergia, fizeram-se potenciais para a promocao de um processo na perspectiva de uma aprendizagem significativa critica."},{"ano":2017,"titulo":"Argumentação na sala de aula e seu potencial metacognitivo como caminho para um enfoque CTS no ensino de química: uma proposta analítica","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"EDUCAÇÃO E PESQUISA","qualis":"A1","area":"Psicologia","temas":["Argumentação","Metacognição e Autorregulação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Psicologia e Subjetividade","Desenvolvimento e Linguagem","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.1590/s1517-9702201704158018","doi":"10.1590/s1517-9702201704158018","resumo":"Resumo O ensino de química muitas vezes é guiado pela utilização de fórmulas e esquemas, dada a natureza dos símbolos que permeiam tal disciplina. Nesse cenário, são poucos os estudos que tratam de aspectos ligados ao processo de reflexão usando temas na área de ciências exatas. Assim, fazer parte da formação de indivíduos críticos e reflexivos em relação ao conhecimento, a eles mesmos e ao ambiente social e natural em que vivem tem sido preocupação de educadores e psicólogos e está na base do movimento CTS – Ciência, Tecnologia e Sociedade. Este estudo, apoiando-se no potencial metacognitivo da argumentação na educação, amplia essa discussão ao investigar se a utilização desse tipo de discurso propicia aos alunos a reflexão sobre seus próprios pensamentos, mostrando um funcionamento ao nível metacognitivo necessário ao enfoque CTS em sala de aula. Foram analisadas produções textuais de três alunos em aulas de química no ensino médio, nas quais se solicitava o posicionamento destes diante da pergunta “Radioatividade: vida ou morte?”, após serem realizados debates sobre esse tema. As análises mostraram que a argumentação, por sua organização discursiva peculiar, se constitui em interessante alternativa para fazer emergir formas de pensamento sofisticadas, como as que definem um pensamento crítico e reflexivo."},{"ano":2017,"titulo":"CONSTRUÇÃO E ANÁLISE DE MATERIAL INSTRUCIONAL POTENCIALMENTE SIGNIFICATIVO PARA O ENSINO DE QUÍMICA NO ENSINO MÉDIO","autores":["Raquel Cordeiro Nogueira Lima","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"APRENDIZAGEM SIGNIFICATIVA EM REVISTA","qualis":"C","area":"Ensino (Ciências/Exatas)","temas":"Ensino de Ciências e Matemática","disciplina":"Química","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://www.researchgate.net/publication/331789336","doi":"","resumo":""},{"ano":2017,"titulo":"Elaboração e validação do jogo do palito no ensino de nomenclatura de compostos orgânicos","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"REVISTA ELETRÔNICA LUDUS SCIENTIAE (RELUS)","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.30691/relus.v1i1.741","doi":"10.30691/relus.v1i1.741","resumo":"O ensino de química orgânica vem sendo pautado na memorização de representações e procedimentos de modo mecânico. Como alternativa, o uso de jogos didáticos vem sendo implementado como estratégias voltadas a um ensino que propicia o protagonismo no processo de ensino-aprendizagem ao aluno. Contudo, faz-se necessário a validação do jogo quanto ao atendimento dos propósitos educacionais e lúdicos, além de garantir que o custo e o tempo de fabricação facilitem sua utilização no ensino básico. Este trabalho apresenta os resultados da validação do Jogo dos Palitos (elaborado pelos autores), bem como o estudo de sua acessibilidade à sala de aula. O Jogo dos Palitos pode ser classificado como uma metodologia de baixo custo e que não requer tempo algum para preparo. Do ponto de vista da validação, constatou-se seu êxito na aprendizagem do procedimento de elaborar cadeias carbônicas utilizando fórmula de linhas de ligação, bem como em aplicar as regras da IUPAC para nomear estruturas orgânicas."},{"ano":2017,"titulo":"SISTEMATIZAÇÃO DA AVALIAÇÃO DO ENSINO: UMA PROPOSTA FUNDAMENTADA A LUZ DO PROCESSO DE ENFERMAGEM","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"REVISTA CONTEXTO & SAÚDE","qualis":"A4","area":"Educação","temas":["Metacognição e Autorregulação","Avaliação e Trajetórias"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.21527/2176-7114.2017.33.174-185","doi":"10.21527/2176-7114.2017.33.174-185","resumo":"&lt;p&gt;Considerando a perspectiva de ensinar/aprender/avaliar como processo relacional com o mundo, faz necessário que os docentes pensem em novas e diversas estratégias para ensinar e analisar. Nesta vertente, este estudo objetiva propor um modelo de avaliação do ensino de forma sistematizada, com base no Processo de Enfermagem (PE). Para fomentar este estudo, foi realizada uma revisão da literatura. A Sistematização da Avaliação do Ensino (SAE) sugerida vem se estabelecer como um método que visa a substanciar o olhar docente pela ótica da integralidade em que cada aluno se insere na conjuntura educativa. Contempla cinco etapas inter-relacionadas: Histórico do aluno, avaliação diagnóstica, planejamento das estratégias de ensino, implementação das estratégias de ensino e avaliação da aprendizagem. A autorregulação ainda se constitui um desafio à prática docente, pois se refere a um processo de avaliação das situações de aprendizagem utilizado para direcionar a construção dos saberes. A SAE, proposta neste estudo, contempla uma avaliação que direciona um ensino significativo ao aluno contribuindo para um processo relacional de ensino e aprendizagem emancipatória.&lt;/p&gt;"},{"ano":2016,"titulo":"A IMPLICAÇÃO DAS EMOÇÕES NO INÍCIO DA VIVÊNCIA HOSPITALAR EM GRADUANDOS DE ENFERMAGEM","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"PSICOLOGIA & SABERES","qualis":"A4","area":"Educação","temas":["Psicologia e Subjetividade","Políticas e Equidade Educacional"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.3333/ps.v5i6.764","doi":"10.3333/ps.v5i6.764","resumo":"O ensino pratico assistencial no curriculo de enfermagem e de extrema importância por apresentar ao discente a realidade profissional. A formacao pretende garantir a capacitacao dos academicos em relacao a autonomia e discernimento para assegurar a integralidade e a humanizacao da assistencia. Assim, e necessario discutir o estado emocional do academico, dentro e fora do ambiente hospitalar. O estudo pretendeu descrever a implicacao do inicio da vivencia hospitalar no surgimento de emocoes conflitantes em graduandos de enfermagem. Trata-se de estudo qualitativo, exploratorio e de campo que desenvolveu 10 entrevistas semiestruturada com academicos do curso de enfermagem de uma universidade publica. As falas foram analisadas e interpretadas por meio da Analise Tematica. Os resultados apontam que as primeiras experiencias praticas no campo hospitalar provocam uma serie de emocoes que pode beneficiar a formacao do discente ou prejudica-la. A forma de lidar como este aspecto pelo estudante, pelos docentes e pela instituicao de ensino aparece como fator essencial na formacao de profissionais mais bem preparados. Conclui-se que o aprofundamento de estudos dessa tematica pode possibilitar a criacao de estrategias que transformem situacoes negativas detectadas em possibilidades de qualificacao do processo ensino-aprendizagem."},{"ano":2016,"titulo":"El debate crítico","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"TEXTOS DE DIDACTICA DE LA LENGUA Y DE LA LITERATURA","qualis":"Sem Qualis","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://www.researchgate.net/publication/314998950","doi":"","resumo":""},{"ano":2016,"titulo":"Narrando o tempo/vida: reflexões teóricas sobre a experiência discursiva de ser e estar na linguagem","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"TRAVESSIAS (UNIOESTE. ONLINE)","qualis":"A4","area":"Psicologia","temas":["Psicologia e Subjetividade","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://dialnet.unirioja.es/descarga/articulo/8093212.pdf","doi":"","resumo":"On the present paper it is briefly introduced the culturalistic perspective and its relevance towards the studies in Psychology, taking its historical dimension and also its mains characters who legitimated the linguistic turn into the psychological studies, I do not intend an exhaustive revision, but actually, define the horizons of the field. Using as an example it will be analyzed the discursive markers in the Portuguese Fado entitled “Vida vivida” [lived life] from Argentina Santos, discussing the subjective life materiality and the potential of artistic creation as analogous to real life subjectivity. It is seem that the uses of determined linguistic markers enables not only the textual construction (syntax and semantics relations), but also, the ways a person organize its own life (psychological subjective experience), as so, the social practices enabled by discursive organization (in pragmatic level), constituting one’s own life plot (as the textuality of human experience) as a form of self-narrative. Arguing, from the analyzed example, the importance of the experiential dimension of human life lived through language (as a poetic dimension of experience), and, perhaps, neglected in some perspectives of contemporary Psychology. It is also discussed the relevance of studying narratives in psychology, since it (the narrative) allows us construct realities, make sense and experience subjective life."},{"ano":2016,"titulo":"O JOGO DAS REAÇÕES ORGÂNICAS: UM CAMINHO PARA REELABORAÇÃO DO CONHECIMENTO A PARTIR DO ERRO","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"REVISTA DEBATES EM ENSINO DE QUÍMICA","qualis":"A1","area":"Educação","temas":["Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://www.journals.ufrpe.br/index.php/REDEQUIM/article/view/1294/1054","doi":"","resumo":""},{"ano":2015,"titulo":"A experiência da unidade espaço-tempo na literatura e na psicologia","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"BAKHTINIANA - REVISTA DE ESTUDOS DO DISCURSO","qualis":"A1","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.1590/2176-457320791","doi":"10.1590/2176-457320791","resumo":"RESUMONeste ensaio defende-se o argumento de que a configuração cronotópica potencializa a obra literária como forma metafórica para experimentar a vida cotidiana. Esse argumento apoia-se nas declarações em que Bakhtin destacou que a organização de processos psicológicos de personagens no enredo está relacionada com a experiência da unidade tempo-espaço, conceitualmente denominada de cronotopo. Para exemplificar essas questões desenvolveu-se aqui uma análise da configuração cronotópica do autor-personagem no Livro do desassossego de Fernando Pessoa. A dificuldade do autor-personagem para negociar as posições de figura e fundo no seu pensamento refletiu uma experiência de fronteira específica, revelada na frequente associação de termos antagônicos e uso frequente de neologismos. Percebendo o funcionamento cronotópico da narrativa, discute-se o potencial da literatura na provisão de metáforas para vida real. Nessas considerações chamou-se a atenção para a participação do leitor na constituição do cronotopo e da obra."},{"ano":2015,"titulo":"Análise da produção argumentativa em redações de jovens pré-acadêmicos","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":"Jaime Luiz Bezerra do Nascimento","periodico":"TÓPICOS EDUCACIONAIS","qualis":"B4","area":"Educação","temas":["Argumentação","Pensamento Crítico e Reflexivo"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doaj.org/article/398b2aaecc594fbaa679635bd988a9a0","doi":"","resumo":"\"Este artigo apresenta aspectos de um estudo sobre a aprendizagem do texto dissertativo-argumentativo no eixo de produção escrita em língua portuguesa. Partindo de uma perspectiva dialógica de argumentação e entendendo-a como composta por argumento, contra-argumento e resposta, textos produzidos por jovens pré-acadêmicos no treino para o ENEM foram analisados. As análises mostraram que os textos buscaram atender às exigências do gênero, especialmente selecionando argumentos e propondo respostas à questão temática, mas nem sempre apresentando contraposições. Foi possível perceber, no entanto, que quando antecipa contra-argumentos, negociando perspectivas, o texto ganha em qualidade argumentativa e em sofisticação nas propostas de intervenção, o que levou à conclusão do quanto a compreensão e exercício da estrutura composta por argumento, contra-argumento e resposta poderia trazer ganhos qualitativos nessa produção e consequentemente na capacidade reflexiva dos alunos.\""},{"ano":2015,"titulo":"Construção de sentidos na escolha profissional de jovens: reflexões a partir da perspectiva sócio-histórica","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"TEMA: REVISTA ELETRÔNICA DE CIÊNCIAS","qualis":"A3","area":"Psicologia","temas":["Pensamento Crítico e Reflexivo","Psicologia e Subjetividade"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"http://revistatema.facisa.edu.br/index.php/revistatema/article/viewFile/253/pdf","doi":"","resumo":"Perspectivas socio-historicas da Psicologia postulam que a atividade humana e capaz de emancipar o individuo criando possibilidades de desenvolvimento pessoal e contribuindo para a transformacao positiva da sociedade. Entretanto, ao mesmo tempo em que edifica o individuo, as acoes humanas podem, inversamente, dificultar a negociacao de significados e gerar alienacao em lugar da conscientizacao. Este artigo tem como objetivo discutir aspectos da construcao de sentidos gerados a partir das escolhas profissionais de jovens de um municipio da Zona da Mata de Pernambuco, Brasil. Coletaram-se os dados da pesquisa utilizando a tecnica de grupo focal e a partir da producao de um texto escrito pelos participantes. As analises dos resultados sugerem que os discursos dos estudantes carregam varios sentidos produzidos que determinam o momento da escolha profissional, levando-os, em sua maioria, a reproduzir um modelo de discurso e de atividade que acaba por dificultar os processos de constituicao enquanto individuos criticos e reflexivos. Conclui-se que e necessario tornar a escola um espaco de reflexao, onde esses jovens possam ter acesso a informacoes e discutir criticamente sobre a imposicao de sentidos hegemonicos, para alargar suas possibilidades e potencializar oportunidades de realizacao profissional."},{"ano":2015,"titulo":"Herbivoria em Dalbergia ecastophyllum em área de restinga do Norte de Pernambuco, Brasil","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"NATUREZA ON LINE (ESPÍRITO SANTO)","qualis":"C","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://naturezaonline.com.br/revista/article/view/170","doi":"","resumo":""},{"ano":2014,"titulo":"Bivalves oriundos de ecossistemas locais comercializados no Litoral Norte de Pernambuco, Brasil","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"EDUCAÇÃO AMBIENTAL EM AÇÃO","qualis":"Sem Qualis","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://www.revistaea.org/artigo.php?idartigo=1901","doi":"","resumo":"A classe Bivalvia compreende moluscos de corpo achatado lateralmente que possuem concha calc�ria formada por duas valvas que protegem a massa visceral"},{"ano":2014,"titulo":"O desenvolvimento metacognitivo em situação de argumentação no ensino de química","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"REVISTA DE EDUCACION DE LAS CIENCIAS","qualis":"B1","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Metacognição e Autorregulação","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://scholar.google.com/scholar?q=O%20desenvolvimento%20metacognitivo%20em%20situa%C3%A7%C3%A3o%20de%20argumenta%C3%A7%C3%A3o%20no%20ensino%20de%20qu%C3%ADmica","doi":"","resumo":""},{"ano":2014,"titulo":"Pesquisador e professor um caso a ser contado","autores":"Valter Cesar Montanher","estudantes":[],"periodico":"CIÊNCIA & ENSINO (ONLINE)","qualis":"A2","area":"Educação","temas":"Ensino de Ciências e Matemática","disciplina":"Ciências (geral)","tipo":"Empírico/Prático","idioma":"Português","link":"http://prc.ifsp.edu.br/ojs/index.php/cienciaeensino/article/view/895","doi":"","resumo":""},{"ano":2013,"titulo":"Investindo na formação inicial do professor - pesquisador: Reflexão e mudança na formação do professor de ciências","autores":["Jose Ayron Lira dos Anjos","Kátia Calligaris Rodrigues"],"estudantes":[],"periodico":"CADERNOS DE PEDAGOGIA NO ENSINO SUPERIOR","qualis":"Sem Qualis","area":"Educação","temas":"Formação de Professores","disciplina":[],"tipo":"Teórico","idioma":"Não informado","link":"https://scholar.google.com/scholar?q=Investindo%20na%20forma%C3%A7%C3%A3o%20inicial%20do%20professor%20-%20pesquisador%3A%20Reflex%C3%A3o%20e%20mudan%C3%A7a%20na%20forma%C3%A7%C3%A3o%20do%20professor%20de%20ci%C3%AAncias","doi":"","resumo":""},{"ano":2013,"titulo":"Uso de mapas conceituais: percepções sobre a construção de conhecimentos de estudantes do ensino médio a respeito do tema radioatividade","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"CIÊNCIAS & COGNIÇÃO (UFRJ)","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://cienciasecognicao.tempsite.ws/revista/index.php/cec/article/view/854","doi":"","resumo":"RESUMO ESTE TRABALHO DESTINA-SE A INVESTIGAR AS CONTRIBUICOES DOS MAPAS CONCEITUAIS NA ANALISE DA CONSTRUCAO DO CONHECIMENTO RELACIONADO AO TEMA RADIOATIVIDADE NO ENSINO DE QUIMICA COM ESTUDANTES DO TERCEIRO ANO DO ENSINO MEDIO, TENDO COMO PARADIGMA TEORICO A APRENDIZAGEM SIGNIFICATIVA DE DAVID AUSUBEL. TAL TEORIA COMPREENDE QUE O APRENDIZ SE APROPRIA DO CONHECIMENTO, POR ELABORACAO PESSOAL, A PARTIR DE CONCEITOS PRE-EXISTENTES EM SUA ESTRUTURA COGNITIVA, QUE VAO SE MODELANDO E SE APRIMORANDO POR DIFERENCIACAO PROGRESSIVA E/OU RECONCILIACAO INTEGRATIVA NO DECORRER DO PROCESSO DE ENSINO E APRENDIZAGEM. PARTINDO DESSA TEORIA, JOSEPH NOVAK DESENVOLVEU A METODOLOGIA DE MAPAS CONCEITUAIS, NO SENTIDO DE REPRESENTAR COMO O CONHECIMENTO E ARMAZENADO NA ESTRUTURA COGNITIVA DE UM ESTUDANTE. UTILIZANDO COMO CATEGORIAS DE ANALISE A DIFERENCIACAO PROGRESSIVA E A RECONCILIACAO INTEGRATIVA, MAPAS CONCEITUAIS DE DOIS ESTUDANTES, ANTES E DEPOIS DA REFERIDA UNIDADE TEMATICA, SAO ESTUDADOS PARA A COMPREENSAO DA ORGANIZACAO CONCEITUAL QUE OS ESTUDANTES ATRIBUIRAM AO TEMA. AS ANALISES MOSTRAM QUE OS MAPAS CONCEITUAIS CONSTITUEM-SE EM RECURSO PRIVILEGIADO DE ACOMPANHAMENTO DO PROCESSO ENSINO E APRENDIZAGEM DOS ESTUDANTES POR SEUS EDUCADORES. PALAVRAS-CHAVE : MAPAS CONCEITUAIS; RADIOATIVIDADE; ENSINO DE QUIMICA; DIFERENCIACAO PROGRESSIVA; RECONCILIACAO INTEGRATIVA ABSTRACT THIS STUDY AIMS TO INVESTIGATE THE CONTRIBUTIONS OF CONCEPTUAL MAPS IN THE ANALYSIS OF THE CONSTRUCTION OF KNOWLEDGE RELATED TO"},{"ano":2012,"titulo":"Characterization of aortic valve stenosis by mathematical modelling of the reflectance spectroscopy","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"JOURNAL OF BIOMEDICAL GRAPHICS AND COMPUTING","qualis":"Sem Qualis","area":"Outras produções científicas","temas":"Outras produções científicas","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.5430/jbgc.v2n2p48","doi":"10.5430/jbgc.v2n2p48","resumo":"Background: The stenosis of the aortic valve is a consequence of an increased thickness and disorganization of the collagen fibre network and extracellular matrix, plus the deposits of calcification in the layers of the val
