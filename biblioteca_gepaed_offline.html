<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca GEPAEd — Produção Científica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF8F1; --navy:#15263F; --navy2:#22406B; --gold:#BE8F2C; --gold-2:#D8B65A;
  --gold-soft:#EFE0B6; --gold-bg:#F7EFD9; --ink:#26303E; --muted:#6B7480;
  --line:#EAE3D3; --card:#FFFFFF; --shadow:0 6px 24px rgba(21,38,63,.07);
  --shadow-h:0 14px 40px rgba(21,38,63,.13); --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:Fraunces,Georgia,serif}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(251,248,241,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:68px}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;border:0;background:none}
.brand .logo{height:36px;width:auto;flex:none;display:block}
.brand .bt{display:flex;flex-direction:column;line-height:1.05;text-align:left}
.brand .bt b{font-family:Fraunces;font-weight:700;color:var(--navy);font-size:19px;letter-spacing:.3px}
.brand .bt span{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.nav{display:flex;gap:6px}
.nav button{border:0;background:none;color:var(--navy);font:inherit;font-size:14px;padding:8px 14px;border-radius:10px;cursor:pointer;transition:.18s}
.nav button:hover{background:var(--gold-bg)}

/* hero */
.hero{position:relative;overflow:hidden;padding:64px 0 36px}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 380px at 78% -10%,rgba(216,182,90,.20),transparent 60%);pointer-events:none}
.eyebrow{display:inline-block;color:var(--gold);font-weight:600;font-size:12.5px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.hero h1{font-size:clamp(34px,5.4vw,58px);font-weight:600;color:var(--navy);letter-spacing:-.5px;line-height:1.04}
.hero p.lead{margin-top:16px;max-width:620px;font-size:18px;color:var(--muted)}
.search{margin-top:30px;max-width:580px;display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 6px 6px 20px;box-shadow:var(--shadow);transition:.2s}
.search:focus-within{border-color:var(--gold-2);box-shadow:0 8px 30px rgba(190,143,44,.16)}
.search svg{flex:none;color:var(--muted)}
.search input{flex:1;border:0;outline:0;font:inherit;font-size:16px;background:none;color:var(--ink)}
.search button{flex:none;border:0;background:var(--navy);color:#fff;font:inherit;font-weight:600;padding:11px 22px;border-radius:999px;cursor:pointer;transition:.18s}
.search button:hover{background:var(--navy2)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:40px 0 8px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow)}
.stat b{display:block;font-family:Fraunces;font-size:32px;font-weight:700;color:var(--navy);line-height:1}
.stat span{font-size:13px;color:var(--muted)}

/* section */
.section{padding:30px 0}
.section h2{font-size:26px;font-weight:600;color:var(--navy);margin-bottom:4px}
.section .sub{color:var(--muted);margin-bottom:24px;font-size:15px}

/* mode cards */
.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.mode{position:relative;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;cursor:pointer;transition:.22s;box-shadow:var(--shadow);overflow:hidden}
.mode:hover{transform:translateY(-4px);box-shadow:var(--shadow-h);border-color:var(--gold-2)}
.mode .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:var(--gold-bg);color:var(--gold);margin-bottom:16px;transition:.22s}
.mode:hover .ic{background:var(--navy);color:var(--gold-2)}
.mode h3{font-size:18px;color:var(--navy);margin-bottom:5px;font-weight:600}
.mode p{font-size:13.5px;color:var(--muted)}
.mode .cnt{position:absolute;top:18px;right:20px;font-size:12px;color:var(--gold);font-weight:600}

/* how to */
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:8px}
.step{display:flex;gap:14px;align-items:flex-start}
.step .n{flex:none;width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold-2);font-family:Fraunces;font-weight:700;display:grid;place-items:center}
.step h4{color:var(--navy);font-size:15px;margin-bottom:2px}
.step p{font-size:13.5px;color:var(--muted)}

/* breadcrumb */
.crumb{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);padding:26px 0 4px}
.crumb button{border:0;background:none;color:var(--gold);font:inherit;cursor:pointer;padding:0;font-weight:600}
.crumb .sep{opacity:.5}

/* facet cards */
.facet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:10px 0 40px}
.facet{display:flex;justify-content:space-between;align-items:center;gap:10px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.facet:hover{transform:translateY(-3px);box-shadow:var(--shadow-h);border-color:var(--gold-2)}
.facet .fn{color:var(--navy);font-weight:600;font-size:15px}
.facet .fc{background:var(--gold-bg);color:var(--gold);font-weight:700;font-size:13px;border-radius:999px;padding:3px 11px;flex:none}

/* results layout */
.results{display:grid;grid-template-columns:262px 1fr;gap:28px;padding:8px 0 60px;align-items:start}
.filters{position:sticky;top:88px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:8px 4px;box-shadow:var(--shadow)}
.fgroup{border-bottom:1px solid var(--line)}
.fgroup:last-child{border-bottom:0}
.fgroup>summary{list-style:none;cursor:pointer;padding:13px 18px;font-weight:600;color:var(--navy);font-size:14px;display:flex;justify-content:space-between;align-items:center}
.fgroup>summary::-webkit-details-marker{display:none}
.fgroup>summary::after{content:"+";color:var(--gold);font-size:18px}
.fgroup[open]>summary::after{content:"–"}
.fopts{padding:2px 18px 14px;max-height:240px;overflow:auto}
.fopt{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);padding:5px 0;cursor:pointer}
.fopt input{accent-color:var(--gold);width:15px;height:15px}
.fopt .oc{margin-left:auto;color:var(--muted);font-size:12px}
.clearf{width:100%;text-align:left;border:0;background:none;color:var(--gold);font:inherit;font-weight:600;font-size:13px;padding:12px 18px;cursor:pointer}

.rhead{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.rhead .cnt{color:var(--navy);font-weight:600;font-size:15px}
.rhead .tools{display:flex;gap:10px;align-items:center}
.rhead select,.rhead .exp{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font:inherit;font-size:13px;color:var(--ink);cursor:pointer}
.rhead .exp{color:var(--navy);font-weight:600}
.rhead .exp:hover{border-color:var(--gold-2)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 16px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--gold-bg);color:#8a6a17;border:1px solid var(--gold-soft);border-radius:999px;padding:5px 8px 5px 12px;font-size:12.5px;font-weight:500}
.chip button{border:0;background:none;cursor:pointer;color:#8a6a17;font-size:15px;line-height:1;padding:0 2px}

/* article cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
.art{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 20px 16px;box-shadow:var(--shadow);transition:.2s;display:flex;flex-direction:column;cursor:pointer}
.art:hover{box-shadow:var(--shadow-h);border-color:var(--gold-soft)}
.art .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.art .yr{font-size:13px;color:var(--muted);font-weight:500}
.qbadge{font-size:11.5px;font-weight:700;border-radius:7px;padding:3px 9px;background:#EEF1F5;color:#5a6675}
.qbadge.hi{background:var(--navy);color:var(--gold-2)}
.art h3{font-family:Inter;font-size:15.5px;font-weight:600;color:var(--navy);line-height:1.32;margin-bottom:9px}
.art .au{font-size:13px;color:var(--ink);margin-bottom:3px}
.art .pe{font-size:12.5px;color:var(--muted);font-style:italic;margin-bottom:12px}
.art .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
.tag{font-size:11px;background:var(--gold-bg);color:#8a6a17;border-radius:6px;padding:2px 8px}
.tag.alt{background:#EEF1F5;color:#5a6675}
.art .detail{max-height:0;overflow:hidden;transition:max-height .3s ease;border-top:1px solid transparent}
.art.open .detail{max-height:600px;border-top-color:var(--line);margin-top:14px;padding-top:14px}
.art .detail p{font-size:13px;color:var(--ink);margin-bottom:10px}
.art .detail .meta{font-size:12px;color:var(--muted);margin-bottom:4px}
.art .go{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;margin-top:6px;background:var(--navy);color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;transition:.18s}
.art .go:hover{background:var(--gold);color:var(--navy)}
.empty{padding:60px;text-align:center;color:var(--muted)}

footer{border-top:1px solid var(--line);margin-top:30px;padding:30px 0;color:var(--muted);font-size:13px}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

@media(max-width:880px){
  .stats,.modes{grid-template-columns:repeat(2,1fr)}
  .how{grid-template-columns:1fr}
  .results{grid-template-columns:1fr}
  .filters{position:static}
}
.fade{animation:fade .45s ease both}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>

window.GEPAED_ARTIGOS = [{"ano":2026,"titulo":"Contexto Social e Conhecimentos Declarativos de Ingressantes no Curso de Física-LicenciaturaSocial Context and Declarative Knowledge of New Students in the Physics Undergraduate Program","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"REVISTA DE ENSEÑANZA DE LA FÍSICA","qualis":"A1","area":"Educação","temas":["Metacognição e Autorregulação","Formação de Professores","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Física","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://doi.org/10.55767/2451.6007.v38.n1.52397","doi":"10.55767/2451.6007.v38.n1.52397","resumo":"O presente trabalho apresenta uma análise diagnóstica inicial sobre o perfil de estudantes ingressantes no curso de Licenciatura em Física, com foco em seu contexto físico e social de estudo e seu conhecimento declarativo sobre estratégias cognitivas simples. A pesquisa parte da constatação de que muitos desses estudantes enfrentam dificuldades na resolução de problemas de Física, o que contribui para elevadas taxas de retenção e evasão, especialmente nos primeiros semestres do curso. Justifica-se, portanto, a importância de compreender os conhecimentos declarativos o contexto físico e social em que esses estudantes apresentam ao ingressar no curso, a fim de subsidiar intervenções pedagógicas e promover o desenvolvimento da autorregulação da aprendizagem (ARA). A metodologia adotada envolveu a aplicação do Formulário Eletrônico de Análise Diagnóstica da Autorregulação da Aprendizagem (ADARA), composto por questões abertas e fechadas distribuídas em 4 blocos principais. O instrumento foi respondido por 38 estudantes na primeira semana do curso, e permitiu levantar dados sobre o ambiente físico de estudo, tempo disponível para estudar, organização pessoal e domínio de estratégias cognitivas. Para fins deste trabalho, foram selecionadas quatro perguntas fechadas consideradas mais representativas, além da análise do domínio declarado e observado sobre estratégias básicas de resolução de problemas."},{"ano":2026,"titulo":"Realização de tipagem sanguínea em alunos de terceiro ano de escola do município de Igarassu/PE: relato de experiência de extensionistas","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"REVISTA EXTENSÃO","qualis":"A4","area":"Educação","temas":"Ensino de Ciências e Matemática","disciplina":"Biologia","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://revista.unitins.br/index.php/extensao/article/view/10931","doi":"","resumo":""},{"ano":2025,"titulo":"Clima escolar e o impacto de intervenções pedagógicas na mediação docente, segurança emocional e aprendizagem","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"REVISTA EDUCAÇÃO & ENSINO - ISSN 2594-4444","qualis":"B1","area":"Psicologia","temas":["Aprendizagem Significativa","Formação de Professores","Psicologia e Subjetividade","Avaliação e Trajetórias"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://doi.org/10.71136/ree.v9i1.853","doi":"10.71136/ree.v9i1.853","resumo":"O artigo analisa como intervenções pedagógicas e estruturais influenciam o clima escolar, com foco no desenvolvimento socioemocional e acadêmico de alunos do Ensino Fundamental I. A partir de um relato de experiência, descrevem-se estratégias como reorganização do espaço físico, escuta ativa, ensino de habilidades socioemocionais e formação docente. Os resultados evidenciam redução de conflitos, aumento do engajamento e melhoria no desempenho escolar. Também é proposto um protocolo de intervenção estruturado em níveis (individual, grupal e coletivo), com metas de curto e longo prazo. A análise reforça que vínculos afetivos positivos, segurança emocional e cooperação entre educadores, alunos e famílias são essenciais para uma aprendizagem significativa. Conclui-se que intervenções planejadas, integradas ao cotidiano escolar, promovem um clima favorável ao bem-estar e ao sucesso acadêmico."},{"ano":2025,"titulo":"Conflictos y articulaciones sobre las formas de hacer música: Una aproximación cualitativa a la subjetividad de músicos independientes","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"APOSTA: REVISTA DE CIENCIAS SOCIALES","qualis":"A2","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://dialnet.unirioja.es/servlet/articulo?codigo=10443834","doi":"","resumo":""},{"ano":2025,"titulo":"Ensino Fundamental, Ecologia e diversidade: uma vivência no estágio","autores":"Tais de Oliveira Silva","estudantes":[],"periodico":"","qualis":"B1","area":"Educação","temas":"Formação de Professores","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://doi.org/10.21680/2763-6488.2025V7N1ID40909.","doi":"10.21680/2763-6488.2025V7N1ID40909.","resumo":""},{"ano":2025,"titulo":"Identificação de autorregulação da aprendizagem em formulário de hábitos de estudo do ENEM","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"RENOTE. REVISTA NOVAS TECNOLOGIAS NA EDUCAÇÃO","qualis":"A4","area":"Educação","temas":"Metacognição e Autorregulação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://seer.ufrgs.br/renote/article/view/149299","doi":"","resumo":""},{"ano":2025,"titulo":"Living in music: The many paths to the possible and the inescapable form-of-life of independent musicians","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"POSSIBILITY STUDIES & SOCIETY","qualis":"B2","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1177/27538699251337730","doi":"10.1177/27538699251337730","resumo":"This study examines how independent musicians inhabit and persist in music as an inescapable form-of-life, shaping and sustaining themselves through creative engagement with the “possible.” Drawing on Vlad Glăveanu’s concept of the “possible” and Giorgio Agamben’s notion of “form-of-life,” we explore how music becomes more than a career for these artists—it forms the core of their existence, structuring identity, resilience, and purpose. Therefore, we aim to understand how tensions, restrictions, obstacles and other forms of semiotic mediation guide how a possible becomes “the” only possible for these musicians. Using a multiple case study design, we conducted semi-structured interviews and participant observations with seven independent musicians, each with over a decade of creative experience. Dialogical discourse analysis was employed to assess different forms of engagement with musical work. These themes illustrate how musicians sustain their practice not just economically but as an essential aspect of life. Our findings suggest that musicians inhabit music through multiple, interconnected dimensions, affirming it as an existential necessity. This study highlights the formation of the inescapable possibility of being a musician for our participants."},{"ano":2025,"titulo":"Obstáculos educacionais entre estudantes brasileiros: desvendando barreiras a partir de um modelo psicoeducacional","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"AVALIAÇÃO PSICOLÓGICA","qualis":"A1","area":"Educação","temas":["Políticas e Equidade Educacional","Avaliação e Trajetórias"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://dialnet.unirioja.es/servlet/oaiart?codigo=10674186","doi":"","resumo":"O presente artigo objetivou avaliar os impactos de contextos de baixa equidade educacional em variáveis escolares e individuais de estudantes brasileiros. Para tanto, utilizou-se um modelo psicoeducacional que equaciona as experiências dos estudantes e que mensura as dimensões escolares e individuais desse fenômeno. A amostra foi composta por estudantes brasileiros da Educação Básica (n=646). Os participantes foram comparados em termos de gênero, cor/raça, condição socioeconômica e série escolar nas dimensões escolares e individuais da equidade através do Instrumento de Avaliação da Equidade Educacional (IAE-E; total de 18 facetas). Em conjunto, os resultados convergem em parte com evidências anteriores, ratificam o impacto de elementos interseccionais para grupos marginalizados e levantam insights sobre a dinamicidade de obstáculos enfrentados pelos estudantes. Os resultados são discutidos sob uma perspectiva interseccional visando subsidiar intervenções que dialoguem com questões como a diversidade e a justiça social visando dirimir a perpetuação de desigualdades nos sistemas de ensino."},{"ano":2025,"titulo":"Perceptions of Pre-Service Teachers in a Pedagogical Residency Program Teaching Physics Using a PBL Approach","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"EDUCATION SCIENCES","qualis":"C","area":"Educação","temas":["Formação de Professores","Metodologias Ativas e Tecnologia"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.3390/educsci15091190","doi":"10.3390/educsci15091190","resumo":"Background: Unlike medical training, science teacher training in Brazil does not include PBL as a curricular methodology. However, there is a Pedagogical Residency Program (PRP) that allows teaching experiences that are different from those provided in the undergraduate course. Thus, in this research, we propose a formative intervention in PBL for scholarship holders in the Pedagogical Residency Program (hereinafter Residents), aiming to answer the following question: “What are the perceptions of pre-service teachers about the planning, implementation, and evaluation of a PBL intervention in physics teaching?”. Methods: Five Residents taught an elective course specially designed for the application of PBL to teach secondary school physics. The training of the Residents in PBL occurred almost simultaneously with the offering of the elective subject. To reveal their perceptions, we collected Residents’ teaching plans, problem scenarios, and reflective analyses. Results: The results demonstrate that the Residents encountered several difficulties in developing and implementing the PBL methodology when teaching physics. Regarding development, the difficulties lie in coherently aligning the learning objectives with the highly complex active methodology of PBL. In addition, another clear difficulty is developing a problem situation appropriate to the knowledge that one wishes to develop. During the intervention, the Residents realized how difficult it is to implement PBL to allow st"},{"ano":2025,"titulo":"Petroflex: FlexQuest para o ensino de Ciências no contexto do derramamento de óleo nas praias brasileiras","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"ENSINO DE CIÊNCIAS E TECNOLOGIA EM REVISTA","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Educação Ambiental","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://doi.org/10.31512/encitec.v16i1.2164","doi":"10.31512/encitec.v16i1.2164","resumo":"Este estudo objetivou desenvolver e aplicar uma FlexQuest, denominada PetroFlex, voltada para o estudo do desastre do derramamento de óleo nas praias brasileiras em 2019. A pesquisa, de natureza aplicada e abordagem qualitativa, foi realizada com estudantes do 3º ano do Ensino Médio em uma escola pública de Pernambuco, integrando recursos digitais e uma abordagem interdisciplinar para estimular a consciência socioambiental e a pensamento crítico. A metodologia envolveu a aplicação de atividades interativas em uma plataforma online, com os dados sendo interpretados qualitativamente, a partir dos três eixos da FlexQuest: Questões, Processos e Transferência. Os resultados mostraram que a PetroFlex favoreceu o desenvolvimento de habilidades críticas, como argumentação, análise de problemas complexos e tomada de decisão, além de ampliar a compreensão dos impactos socioambientais e das responsabilidades políticas e econômicas relacionadas ao desastre. Conclui-se que a PetroFlex é potencialmente eficaz na promoção de uma aprendizagem interdisciplinar, alinhada às diretrizes da Base Nacional Comum Curricular e aos Objetivos de Desenvolvimento Sustentável da Organização das Nações Unidas, contribuindo para a formação crítica e cidadã dos estudantes."},{"ano":2025,"titulo":"Promoção da educação ecológica com estudantes do Ensino Fundamental via Unidade de Ensino Potencialmente Significativa","autores":"José Antônio Bezerra de Oliveira","estudantes":"Lucas Roberto Santos de Carvalho","periodico":"DEBATES EM EDUCAÇÃO","qualis":"A3","area":"Educação","temas":["Aprendizagem Significativa","Avaliação e Trajetórias","Educação Ambiental"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.28998/2175-6600.2025v17n39pe18225","doi":"10.28998/2175-6600.2025v17n39pe18225","resumo":"A promoção de uma educação ecológica crítica no Ensino Fundamental requer estratégias didáticas que superem a fragmentação do conhecimento e possibilitem a construção de posturas ambientalmente responsáveis desde a infância. Nesse contexto, destaca-se a potencialidade das Unidades de Ensino Potencialmente Significativas como caminhos para articular conhecimentos científicos à realidade dos estudantes. Este estudo teve como objetivo analisar os impactos decorrentes da implementação de uma Unidade de Ensino Potencialmente Significativa (UEPS), visando promover uma aprendizagem significativa e crítica de conceitos ecológicos por parte de estudantes do Ensino Fundamental. Com base na Teoria da Aprendizagem Significativa de Ausubel e na Perspectiva Crítica de Moreira, uma UEPS foi concebida e aplicada em estudantes do 6º ano do Ensino Fundamental, sendo constituída de ações pedagógicas como observações do ambiente, discussões e a resolução de problemas ecológicos contextualizados. Os resultados foram obtidos pela avaliação de questionários aplicados antes e após a intervenção, além das observações do professor regente. A análise dos dados evidenciou uma evolução significativa na assimilação, retenção e capacidade dos estudantes de aplicar os conceitos ecológicos aprendidos, demonstrando a eficácia da UEPS em favorecer tanto a construção do conhecimento ecológico quanto o desenvolvimento de uma consciência ambiental crítica e ativa."},{"ano":2025,"titulo":"UNIDADE DE ENSINO POTENCIALMENTE SIGNIFICATIVA PARA O ESTUDO REMOTO DOS HORMÔNIOS NA EDUCAÇÃO BÁSICA","autores":"José Antônio Bezerra de Oliveira","estudantes":"Lucas Roberto Santos de Carvalho","periodico":"REVISTA CIÊNCIAS & IDÉIAS","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.22407/2176-1477/2025.v16.2681","doi":"10.22407/2176-1477/2025.v16.2681","resumo":"No contexto do ensino de Ciências na Educação Básica, a utilização de estratégias pedagógicas bem estruturadas pode criar condições que possibilitem a aprendizagem significativa dos alunos. Nesta direção, este estudo objetivou desenvolver e aplicar uma Unidade de Ensino Potencialmente Significativa de forma remota, no contexto do ensino de Ciências na Educação Básica, tendo como temática o estudo dos hormônios. Ao longo dos passos sequenciais da UEPS, que vão desde o Levantamento de Conhecimentos Prévios até a Reconciliação Integrativa, foram observados avanços significativos na aprendizagem dos alunos. A abordagem adotada ativou conhecimentos prévios, promoveu interação ativa com o conteúdo e estimulou o pensamento crítico dos alunos por meio da resolução de problemas contextualizados. A análise dos resultados demonstrou considerável articulação conceitual e uma compreensão mais profunda sobre o tema abordado, indicando uma progressão em direção à aprendizagem significativa. Esse estudo destaca não apenas a eficácia da UEPS em um ambiente remoto, mas também sua relevância no contexto desafiador da pandemia, oferecendo insights para o aprimoramento contínuo de estratégias de ensino."},{"ano":2025,"titulo":"Voices and Melodies of Artistic Precarity: The Unbearable Flexibility of Subjectivity in Chilean Independent Musicians","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"HUMAN ARENAS","qualis":"A3","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1007/s42087-025-00486-x","doi":"10.1007/s42087-025-00486-x","resumo":""},{"ano":2024,"titulo":"A Argumentação Dialógica como Fundamento para Aprendizagem Significativa Crítica na Construção Individual de Mapas Conceituais","autores":["Raquel Cordeiro Nogueira Lima","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"REVISTA DEBATES EM ENSINO DE QUÍMICA","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Aprendizagem Significativa","Metacognição e Autorregulação","Pensamento Crítico e Reflexivo","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.53003/redequim.v10i1.5534","doi":"10.53003/redequim.v10i1.5534","resumo":"Pensar a prática pedagógica a partir da preocupação e compromisso com uma aprendizagem significativa e crítica implica necessariamente em refletir sobre estratégias didáticas que envolvam um funcionamento crítico e reflexivo dos estudantes a respeito dos conteúdos conceituais trabalhados. Apoiando-se na dimensão dialógica da argumentação, esse estudo se propõe a mostrar que a construção de mapas conceituais, ainda que individualmente, pode se constituir em um excelente caminho nesse sentido. Essa proposta se fundamenta na ideia defendida aqui, e apoiada em estudos anteriores, da existência de uma dimensão inerentemente argumentativa caracterizando essa construção. Para tanto, dois estudantes do 2º ano do Ensino Médio foram videogravados durante toda a construção individual de um mapa conceitual sobre Sabonetes, no componente curricular Química. Foi solicitado que verbalizassem todos os movimentos realizados por eles no decorrer da atividade. As análises dessa construção denotaram um intenso funcionamento argumentativo, metacognitivo, crítico e reflexivo a partir dos diálogos entre as inúmeras vozes que se mostraram presentes. Esses diálogos de vozes refletiram uma constante negociação entre diferentes perspectivas a respeito da temática e consequente aprendizagem significativa e crítica por parte dos estudantes."},{"ano":2024,"titulo":"Argumentação, prova e demonstração na visão de estudantes ingressantes no curso de licenciatura em Matemática","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"EID","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.47369/eidea-23-3-3985","doi":"10.47369/eidea-23-3-3985","resumo":"O objetivo deste artigo é identificar como estudantes ingressantes no curso de licenciatura em Matemática interpretam as terminologias argumentação, prova e demonstração. Trata-se de um recorte da primeira etapa de uma pesquisa sobre argumentação no âmbito da Educação Matemática. Ao todo, 78 licenciandos de três instituições públicas de Ensino Superior participaram da produção de dados. Para a análise dos dados, foi utilizado um software que permite realizar análises estatísticas sobre dados textuais. Em vista disso, um objetivo secundário deste artigo é apresentar a possibilidade de utilizar o software IRaMuTeQ como um instrumento que auxilia na análise e na criação de categorias. Assim, foi possível inferir que o significado destas terminologias não é consensual entre os participantes e que, na visão deles, a prova estaria relacionada a algo mais formal ou a uma generalização, enquanto a demonstração estaria relacionada a algo mais informal ou a uma etapa que antecede a prova."},{"ano":2024,"titulo":"Employing the intellectual virtues to better understand argumentation interventions in education","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"FRONTLINE LEARNING RESEARCH","qualis":"Sem Qualis","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Teórico","idioma":"Inglês","link":"https://doi.org/10.14786/flr.v12i2.1247","doi":"10.14786/flr.v12i2.1247","resumo":"Argumentation-based classroom interventions are a growing alternative for stimulating conceptual learning, thinking, and communicative skills. However, not all classroom argumentation is desired, nor does every argumentation design lead students to develop their abilities and understanding. In the educational literature, productive argumentation has been associated particularly with deliberation due to the design properties that deliberative practices demand from students, such as collaborating towards a goal, revising one’s own opinion, listening to others, and changing their minds when it is necessary to arrive at a collective decision or problem resolution. We contend that what makes deliberation productive is not argumentation in itself, but how a certain type of design scaffolds students into virtuous-like behavior, which can be the enabling condition for productive argumentation in classroom activities. Through the exploration of three cases of classroom argumentation and discussion experiences, we hypothesize that virtuous-like behavior may serve as an enabling condition for each intervention. In particular, intellectually humble behaviors could be scaffolded within these interventions because all three create the proper environment for students to revise their own positions, listen carefully to others, and change their minds in light of appropriate reasoning or new evidence. Employing an intellectual virtues framework, advances our understanding of how to design class"},{"ano":2024,"titulo":"Equidade e informação: o desafio do acesso à educação infantil nas capitais brasileiras","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"CADERNOS DE EDUCAÇÃO, TECNOLOGIA E SOCIEDADE","qualis":"A3","area":"Educação","temas":"Políticas e Equidade Educacional","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.14571/brajets.v17.n4.1513-1533","doi":"10.14571/brajets.v17.n4.1513-1533","resumo":"O presente estudo investiga as desigualdades no acesso à educação infantil nas 27 capitais brasileiras, com foco nos processos de matrícula e pré-matrícula nas redes municipais de ensino. A pesquisa, de natureza documental, baseou-se na coleta de dados disponíveis nos sites das prefeituras e secretarias de educação, buscando analisar como os sistemas de distribuição de vagas abordam a justiça social e equidade educacional. Os resultados revelam lacunas significativas no acesso à informação. Em cerca de um terço das capitais, os dados sobre documentos necessários para a matrícula não estão disponíveis fora do período de matrículas, comprometendo o planejamento das famílias. Além disso, em 18 capitais, não foram divulgados os critérios para a alocação de vagas, o que indica falta de transparência. Também se observa que 12 capitais realizam o processo de pré-matrícula exclusivamente online, o que exclui famílias sem acesso à internet, prejudicando ainda mais a equidade no acesso à educação. As práticas analisadas indicam a necessidade de políticas educacionais mais inclusivas, que considerem as diversidades socioeconômicas da população. O estudo sugere a implementação de medidas como a criação de pontos de acesso à internet em locais públicos e o fortalecimento de canais de atendimento presenciais e virtuais para garantir maior suporte às famílias no processo de matrícula."},{"ano":2024,"titulo":"Exploring the Unexpected: the Relationship Between Higher Family Income and Dropout Risk","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"PRAXIS & SABER","qualis":"A1","area":"Educação","temas":"Avaliação e Trajetórias","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.19053/uptc.22160159.v15.n41.2024.16848","doi":"10.19053/uptc.22160159.v15.n41.2024.16848","resumo":"This study investigates the paradoxical influence of family income on school dropout risks among Brazilian public-school students. Discussing previous results that challenges traditional perspectives on school dropout by examining how students from higher family income show higher dropout risk. We hypothesize that this is due to flexible capitalism changes in our societies labor market and to the devaluation of schools as a meaningful place for student’s life projects. Analyzing data from 15,924 Brazilian high school and middle school students using Multivariate Analysis of Variance (MANOVA) and univariate models, the study reveals that students from higher-income families are more likely to drop out when they perceive school as less relevant for their future careers. This unexpected finding suggests that, unlike most literature on this field, higher income students might be at greater risk of dropout due to the pressure to enter the workforce and the perceived lack of school's alignment with their career aspirations. This study contributes to the understanding of school dropout in the global south, proposing the need for educational reforms that align with contemporary labor market realities."},{"ano":2024,"titulo":"FLEX-AS: ESTRATÉGIA DIDÁTICA PARA O ENSINO DE CIÊNCIAS NAS PERSPECTIVAS DA aPRENDIZAGEM SIGNIFICATIVA E FLEXIBILIDADE COGNITIVA","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"INVESTIGAÇÕES EM ENSINO DE CIÊNCIAS (ONLINE)","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.22600/1518-8795.ienci2024v29n3p389","doi":"10.22600/1518-8795.ienci2024v29n3p389","resumo":"This study is a segment of a broader research project aimed at identifying connections between the Theory of Meaningful Learning (TML), its critical perspective (CML), and the Theory of Cognitive Flexibility (TCF). Based on this dialogue, the study sought to design a didactic strategy for science teaching in basic education to facilitate the promotion of meaningful and critical learning. Analyzing the principles of these theories led to the identification of five points of convergence, or descriptors, namely: Emphasis on Knowledge Construction, Relevance of Prior Knowledge, Focus on Deep Understanding, Contextualized Learning, and Learning Progressivity. These descriptors guided the development of a didactic strategy for science teaching. The strategy, titled FLEX-AS, consists of four stages: Planning, Preparation, Experience, and Evaluation. Each stage is detailed and theoretically and methodologically grounded. Reflections on the creation of FLEX-AS demonstrated the conceptual coherence of integrating the underlying theories into a less theoretical and more practical framework for educators."},{"ano":2024,"titulo":"Modelagem matemática do jogo de cartas Yu-Gi-Oh! para o ensino de inequações polinomiais do 1º grau","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"STUDIES IN EDUCATION SCIENCES","qualis":"C","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.54019/sesv5n2-007","doi":"10.54019/sesv5n2-007","resumo":"O objetivo deste artigo é apresentar uma proposta de sequência didática, em que é explorada uma aplicação da modelagem matemática no contexto do jogo de cartas Yu-Gi-Oh, para o ensino de inequações polinomiais de 1º grau. Nesta sequência didática trazemos uma Modelagem Matemática associada ao uso de jogos educacionais, sala de aula invertida e aprendizagem em grupo com o propósito de proporcionar um ambiente de aprendizado que promova a compreensão crítica e prática da Matemática, preparando os alunos para enfrentar problemas do mundo real. A sequência proposta incorpora estratégias pedagógicas inovadoras, incluindo a aprendizagem em grupo, que promove a colaboração entre os alunos, a sala de aula invertida, na qual os alunos adquirem conhecimento prévio antes das aulas para aproveitar ao máximo o tempo em sala, e a gamificação, que transforma o processo de aprendizagem em uma experiência envolvente e lúdica. A abordagem proposta visa não apenas promover o entendimento das inequações polinomiais de 1º grau, mas também desenvolver habilidades críticas e de resolução de problemas nos alunos. Além disso, buscamos fornecer insights sobre as potencialidades do uso de jogos no ensino de Matemática, explorando suas aplicações em sala de aula e o possível impacto no engajamento e na aprendizagem significativa dos alunos. Ao tornar o processo de aprendizagem mais agradável e significativo para os alunos, a combinação de Modelagem Matemática, gamificação, sala de aula invertida e apren"},{"ano":2024,"titulo":"Percepções Docentes em Relação ao Agir e Fazer Profissional no Contexto Pandêmico Vivido","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"REVISTA FAEEBA","qualis":"A1","area":"Educação","temas":"Formação de Professores","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.21879/faeeba2358-0194.2024.v33.n74.p133-150","doi":"10.21879/faeeba2358-0194.2024.v33.n74.p133-150","resumo":"A discussão teórico-metodológica construída no artigo tem como proposta analisar as percepções docentes que foram constituídas no contexto pandêmico, ocorrido entre os anos de 2020-2021, como resposta ao cenário educacional configurado, a qual demandou ajustes e acomodações ao agir profissional, marcado pelo caráter emergencial que produziu incertezas, mas ao mesmo tempo resiliência e superação. Diante deste cenário, foi eleita como questão problematizadora a seguinte pergunta: de que maneira o contexto pandêmico atingiu o fazer e agir profissional dos docentes, no que diz respeito à prática educativa concretizada no processo ensino e aprendizagem em sua estrutura e organização? Para que se compreenda este momento, fez-se uso da análise do discurso, a fim de identificar nos depoimentos dos docentes o dito, não dito e os silêncios. Busca-se com a investigação analisar não apenas os impactos da pandemia no âmbito da prática docente, mas o posicionamento assumido diante do seu contexto de trabalho. Ao final da análise, observa-se que os docentes se reinventam e buscam encontrar alternativas que sejam relacionais, coerentes e integradoras com o objetivo educativo almejado."},{"ano":2024,"titulo":"Psychological Well-Being Among Adolescents: The Role of Parenting Styles, Causal Attributions of Academic Success/Failure, and Perceived School Performance","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"JOURNAL OF PSYCHOEDUCATIONAL ASSESSMENT","qualis":"A3","area":"Psicologia","temas":"Psicologia e Subjetividade","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1177/07342829241245462","doi":"10.1177/07342829241245462","resumo":"We investigated the effects of perceived parenting styles, causal attributions for academic success/failure, and perceived school performance (PSP) on adolescents’ psychological well-being (PWB). Participants were 200 Brazilian adolescents who answered the Parenting Styles &amp; Dimensions Questionnaire, the Psychological Well-Being Scale, and the Rating Scale of Causal Attributions for Academic Success/Failure (RSCA). The results showed that adolescents’ PWB was predicted by authoritative parenting style (APS), internal and controllable attributions (appropriate motivations to cope with academic success/failure; ICASF), and PSP. In addition, we tested a mediation model showing that the ICASF mediated the relationship between APS and PSP, which in turn led to better PWB. These results highlighted the relevance of parenting styles and school-based causal attributions for the understanding of adolescents’ mental health. Our findings can support interventions that enable more effective teaching–learning processes, which are associated with higher levels of mental health for the adolescent population."},{"ano":2024,"titulo":"What Learning Strategies are Used by Programming Students? A Qualitative Study Grounded on the Self-regulation of Learning Theory","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"ACM TRANSACTIONS ON COMPUTING EDUCATION","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Metacognição e Autorregulação","Ensino de Ciências e Matemática"],"disciplina":"Computação","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1145/3635720","doi":"10.1145/3635720","resumo":"Self-regulation of learning (SRL) is an essential ability for academic success in multiple educational contexts, including programming education. However, understanding how students regulate themselves during programming learning is still limited. This exploratory research aimed to investigate the regulatory strategies externalized by 51 students enrolled in an introductory programming course. The objective was to identify the SRL strategies used by these students during multiple phases of the learning process and compare the SRL behavior of high and low-performers. The following research questions guided this investigation: (RQ1) What regulation of learning strategies are used by programming students?; and (RQ2) How do the SRL strategies used by high and low-performing students differ?. The findings demonstrate that learning to program involves complex psychological resources (e.g., cognition, metacognition, behavior, motivation, and emotion) and that students present heterogeneity in their SRL repertoire. In addition, high and low-performing students showed significant differences in how they regulate, which can contribute to understanding the factors that may contribute to learning programming. Lastly, we argue that for analyzing SRL strategies, it is necessary to consider the specificities of programming education, which motivated the development of a conceptual framework to describe the identified strategies and regulatory phases in this learning domain."},{"ano":2023,"titulo":"A UTILIZAÇÃO DE UM PROJETO DE ENSINO NA CONSTRUÇÃO DO ENTENDIMENTO TEÓRICO E PRÁTICO ACERCA DA TERMODINÂMICA","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"EXPERIÊNCIAS EM ENSINO DE CIÊNCIAS (UFRGS)","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":"Ensino de Ciências e Matemática","disciplina":"Química","tipo":"Teórico","idioma":"Não informado","link":"https://fisica.ufmt.br/eenciojs/index.php/eenci/article/view/1206/1010","doi":"","resumo":""},{"ano":2023,"titulo":"ARGUMENTAÇÃO E APRENDIZAGEM BASEADA EM PROBLEMAS: PROCESSO DE CONSTRUÇÃO DE CONHECIMENTO CRÍTICO E REFLEXIVO EM SALA DE AULA DE FÍSICA","autores":"Sylvia Regina de Chiaro Ribeiro Rodrigues","estudantes":[],"periodico":"INVESTIGAÇÕES EM ENSINO DE CIÊNCIAS (ONLINE)","qualis":"A1","area":"Educação","temas":["Argumentação","Metacognição e Autorregulação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.22600/1518-8795.ienci2023v28n2p462","doi":"10.22600/1518-8795.ienci2023v28n2p462","resumo":"O presente trabalho tem por objetivo analisar o impacto que a interface entre a Aprendizagem Baseada em Problemas (ABP) e a argumentação pode desempenhar para a promoção da construção do conhecimento no componente curricular de Física, em uma sala de aula regular do Ensino Médio. Tomamos como foco de análise as interações dialógicas entre aluno-aluno e aluno-tutor ao longo da resolução de um problema na metodologia ABP, por entendermos que a configuração deste tipo de metodologia favorece o debate crítico e reflexivo de ideias, característico de um funcionamento metacognitivo. Os resultados apontam indícios de que a metodologia ABP é propícia ao desenvolvimento de ações discursivas que garantem a argumentação, desde que o tutor tenha conhecimento das mesmas e as utilize intencionalmente para manejar as discussões. Além disso, foi compreendido que os movimentos discursivos característicos da argumentação denotam um interessante potencial para o desenvolvimento da função metacognitiva autorreguladora de monitoramento do pensamento em um processo de ensino e de aprendizagem na Física, favorecendo, pois, o exercício do pensamento crítico e reflexivo."},{"ano":2023,"titulo":"AULAS REMOTAS NA PÓS-GRADUAÇÃO: ANÁLISE E PERCEPÇÕES SOBRE O USO DE METODOLOGIAS ATIVAS EM COMPONENTE CURRICULAR OFERTADO DURANTE A PANDEMIA DA COVID-19","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"ENSINO DE CIÊNCIAS E TECNOLOGIA EM REVISTA","qualis":"A4","area":"Educação","temas":"Metodologias Ativas e Tecnologia","disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.31512/encitec.v13i2.1023","doi":"10.31512/encitec.v13i2.1023","resumo":"O presente estudo visou refletir sobre um percurso didático, desenvolvido a partir do uso de metodologias ativas, realizado em um componente curricular de pós-graduação no cenário da educação digital diante da situação pandêmica da Covid-19 iniciada em 2020. As abordagens didáticas aconteceram de modo remoto e as docentes responsáveis pelo referido componente curricular submeteram os discentes a experienciarem variadas formas de ensinar-aprender. As estratégias utilizadas geraram, nos discentes, criticidade, reflexões e tomada de decisões nos estudos sobre os tipos de métodos de pesquisa em educação, tema central do componente. Nesta direção, verifica-se que as interações docente-discente e discente-discente ocasionadas pelas atividades propostas pareceram ter contribuído de forma positiva para a formação dos discentes, indicando que o ensino remoto, com articulação e planejamento docente adequados e mediados por tecnologias e metodologias ativas, pode promover aprendizagens mais significativas."},{"ano":2023,"titulo":"Advancing school dropout early warning systems: the IAFREE relational model for identifying at-risk students","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"FRONTIERS IN PSYCHOLOGY","qualis":"A2","area":"Educação","temas":"Avaliação e Trajetórias","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.3389/fpsyg.2023.1189283","doi":"10.3389/fpsyg.2023.1189283","resumo":"Introduction: There is a global effort to address the school dropout phenomenon. The urgency to act on it comes from the harmful evidence that school dropout has on societal and individual levels. Early Warning Systems (EWS) for school dropout at-risk student identification have been developed to anticipate and help schools have a better chance of acting on it. However, several studies point to a doubt that Correct EWS may come too late because they use only publicly available and general student and school information. We hypothesize that having a tool to assess more subjective and inter-relational factors would help anticipate where and when to act to prevent school dropout. This study aimed to develop a multidimensional measure for assessing relational factors for predicting school dropout (SD) risk in the Brazilian context. Methods: We performed several procedures, including (a) the specialized literature review, (b) the item development of the Relational Factors for the Risk of School Dropout Scale (IAFREE in Portuguese), (c) the content validity analysis, (d) a pilot study, and (e) the administration of the IAFREE to a large Brazilian sample of high school and middle school students (N = 15,924). Results: After the theoretical steps, we found content validity for five relational dimensions for SD (Student-School, Student-School Professionals, Student-Family, Student-Community, and Student-Student) that include 12 facets of risk factors. At the empirical stage, confirmat"},{"ano":2023,"titulo":"Análise da (Re)construção de Mapas Conceituais como estratégia na resolução de problemas de Química","autores":"Jose Ayron Lira dos Anjos","estudantes":[],"periodico":"INSTRUMENTO - REVISTA EM ESTUDO E PESQUISA EM EDUCAÇÃO","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.34019/1984-5499.2023.v25.38602","doi":"10.34019/1984-5499.2023.v25.38602","resumo":"Este trabalho é um recorte de uma pesquisa de mestrado que discorre sobre algumas dificuldades no ensino e aprendizagem, em especial nos conteúdos de Química, atentando-se para algumas estratégias que poderiam promover melhorias no contexto citado. Com base nisso, buscamos analisar como a elaboração de mapas conceituais, como estratégia para a resolução de uma situação-problema, poderia favorecer uma aprendizagem significativa de conteúdos de Química. Metodologicamente, os mapas conceituais com vista à resolução da situação-problema foram analisados com base em uma abordagem qualitativa. Os resultados obtidos indicaram que os mapas conceituais se constituem como uma ferramenta que fornece possibilidades de organização e construção de estratégias que podem ser aplicadas na resolução de problemas, favorecendo a aprendizagem de conteúdos de química de maneira significativa."},{"ano":2023,"titulo":"Fostering regulatory processes using computational scaffolding","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"INTERNATIONAL JOURNAL OF COMPUTER-SUPPORTED COLLABORATIVE LEARNING","qualis":"Sem Qualis","area":"Ensino (Ciências/Exatas)","temas":["Metacognição e Autorregulação","Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Computação","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1007/s11412-023-09388-y","doi":"10.1007/s11412-023-09388-y","resumo":"Abstract The use of computational scaffolding is a crucial strategy to foster students’ regulation of learning skills, which is associated with increased learning achievement. However, most interventions treat the regulatory processes as individual actions isolated from a social context. This view contradicts the most recent research that points to the importance of studying the regulatory phenomenon from a social-cognitive perspective, where students’ interactions influence their regulation of the learning process. This work explores these problems and presents multiple scaffolds to promote Self-regulation of Learning (SRL), co-regulation, and socially shared regulation of learning (SSRL) embedded within a computer-supported collaborative learning environment. A single-blind randomized controlled trial was performed with students ( n = 71) enrolled in an online introductory programming course. Students were randomly assigned to three groups: 1) SRL-only support, 2) SRL, co-regulation, and SSRL support, and 3) a no support control group. The findings revealed that students who received regulatory support achieved higher course grades than the control group. However, only students who received SSRL and co-regulation support achieved superior performance in collaborative activities, confirming the importance of this type of regulation. Even though students did not increase in SRL aptitude, the intervention provided support for achieving higher grades in the course."},{"ano":2023,"titulo":"Impactos do componente curricular `Argumentação na Educação? na competência argumentativa e no manejo de metodologias potencialmente argumentativas por futuros professores","autores":["Raquel Cordeiro Nogueira Lima","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"LINHA D'AGUA","qualis":"Sem Qualis","area":"Educação","temas":["Argumentação","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem","Políticas e Equidade Educacional"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.11606/issn.2236-4242.v36i3p26-50","doi":"10.11606/issn.2236-4242.v36i3p26-50","resumo":"O presente trabalho investigou os impactos da participação de estudantes de Pedagogia no componente curricular eletivo ‘Argumentação na Educação’, que propõe desenvolver nos estudantes competências necessárias para argumentar, bem como para construir e mediar estratégias didáticas argumentativas em ambientes educacionais. Observando os estudantes durante um semestre letivo, nossos objetivos envolveram investigar os impactos na competência argumentativa, bem como na apropriação de conhecimentos de conteúdo pedagógico, relacionados ao manejo da argumentação. As análises apontaram melhorias na qualidade da argumentação construída, além de refinamento do pensamento reflexivo. Houve também ganhos nas habilidades de planejamento e de desenho de atividades potencialmente argumentativas, no emprego de diversas ações discursivas durante a mediação da atividade prática docente, bem como um grau de apropriação dos princípios do Ensino Dialógico. Tais resultados indicam que a combinação dos elementos presentes na disciplina (currículo, metodologias, cultura, postura do professor) foi essencial para o desenvolvimento observado."},{"ano":2023,"titulo":"LINGUAGEM E DESENVOLVIMENTO EM CONTEXTO DE CRISE: EXPLORANDO OS EFEITOS DO ISOLAMENTO SOCIAL NA EDUCAÇÃO","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"ORGANON","qualis":"A3","area":"Educação","temas":"Desenvolvimento e Linguagem","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://seer.ufrgs.br/index.php/organon/article/view/135045","doi":"","resumo":""},{"ano":2023,"titulo":"MAPAS CONCEITUAIS NA AVALIAÇÃO DA APRENDIZAGEM DECORRENTE DE SEQUÊNCIAS DE ENSINO POTENCIALMENTE SIGNIFICATIVAS PARA O ENSINO DE CIÊNCIAS","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"ENSINO DE CIÊNCIAS E TECNOLOGIA EM REVISTA","qualis":"A4","area":"Ensino (Ciências/Exatas)","temas":["Aprendizagem Significativa","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.31512/encitec.v13i1.1068","doi":"10.31512/encitec.v13i1.1068","resumo":"O presente artigo versa sobre a avaliação de sequências de ensino idealizadas para o ensino de ciências que tenham potencial para desenvolver aprendizagens significativas, ou seja, que levem em consideração os conhecimentos prévios do estudante e a assimilação de novos conceitos de modo articulado, não-literal e substantivo, propiciando o surgimento de novos significados para ele. O objetivo do estudo foi avaliar a aprendizagem decorrente de sequências de ensino potencialmente significativas para o ensino de ciências via mapas conceituais. Sendo assim, os estudantes foram submetidos a algumas sequências de ensino e produziram mapas de conceitos antes e após cada abordagem da sequência. A análise comparativa dos mapas conceituais para cada abordagem constatou potencialidade das sequências de ensino aplicadas para a promoção de uma aprendizagem significativa. Além disso, percebeu-se que os mapas favoreceram a organização conceitual dos estudantes, indicando que seu uso nas aulas de ciências pode auxiliar o professor nos processos de ensino e aprendizagem de forma significativa e subsidiar novas perspectivas de avaliação do aprendizado."},{"ano":2023,"titulo":"METODOLOGIA EM CINCO PASSOS: Metodologia Ativa no ensino de Magnetismo","autores":"Kátia Calligaris Rodrigues","estudantes":[],"periodico":"EXPERIÊNCIAS EM ENSINO DE CIÊNCIAS (UFRGS)","qualis":"A3","area":"Ensino (Ciências/Exatas)","temas":["Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Física","tipo":"Empírico/Prático","idioma":"Não informado","link":"https://fisica.ufmt.br/eenciojs/index.php/eenci/article/view/1103","doi":"","resumo":""},{"ano":2023,"titulo":"REDE SOCIAL INSTAGRAM E A TEORIA COGNITIVA DA APRENDIZAGEM MULTIMÍDIA: ANÁLISE DE IMAGENS COM CONTEÚDOS QUÍMICOS DE PERFIL EDUCACIONAL","autores":"Tais de Oliveira Silva","estudantes":[],"periodico":"INVESTIGAÇÕES EM ENSINO DE CIÊNCIAS (ONLINE)","qualis":"A1","area":"Ensino (Ciências/Exatas)","temas":["Metodologias Ativas e Tecnologia","Ensino de Ciências e Matemática"],"disciplina":"Química","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.22600/1518-8795.ienci2023v28n2p292","doi":"10.22600/1518-8795.ienci2023v28n2p292","resumo":"As imagens, em suas diversas formas de representação, atuam como promotoras de significados sociais, políticos e educacionais. No âmbito escolar, são amplamente utilizadas na abordagem de conteúdos, visando colaborar na compreensão de conceitos ao estudante. Todavia, em muitos casos, isso tem implicado em vicissitudes na forma como elas são apresentadas em sala de aula. O docente quando do uso de ilustrações presentes em livros, tecnologias e multimídias necessitam de critérios que possam ajudá-los a melhorar o desenvolvimento de sua prática, propiciando a disseminação adequada do conhecimento. Este estudo qualitativo-descritivo, objetivou analisar os princípios multimidiáticos no ensino-aprendizagem em Química, em imagens postadas em um perfil educacional do Instagram. Para isso, foi selecionado um perfil que abordava e discutia sobre conteúdos químicos, a partir de imagens estáticas sobre ligações químicas. As ilustrações foram classificadas e posteriormente analisadas, tendo como base os Princípios de Coerência, Contiguidade Espacial e Sinalização, relacionados à Carga de Redução de Processamento Estranho, da Teoria Cognitiva da Aprendizagem Multimídia. A Contiguidade Espacial se apresentou satisfatória, seguindo a relação de proximidade entre texto e imagem. Já o Princípio da Sinalização e da Coerência precisam ser mais delineados, no tocante à presença de elementos que podem provocar compreensões equivocadas/inapropriadas sobre os conceitos químicos. As postagens em Rede"},{"ano":2023,"titulo":"The Natural Tendency for Wide and Careful Listening: Exploring the Relationship Between Open-Mindedness and Psychological Science","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"INTEGRATIVE PSYCHOLOGICAL AND BEHAVIORAL SCIENCE","qualis":"A3","area":"Educação","temas":"Pensamento Crítico e Reflexivo","disciplina":[],"tipo":"Teórico","idioma":"Inglês","link":"https://doi.org/10.1007/s12124-023-09774-z","doi":"10.1007/s12124-023-09774-z","resumo":""},{"ano":2023,"titulo":"funcionamento metacognitivo docente na adequação de estratégias pedagógicas do modelo presencial para o remoto","autores":["Kátia Calligaris Rodrigues","Sylvia Regina de Chiaro Ribeiro Rodrigues","Valter Cesar Montanher"],"estudantes":"Paula Eduarda Nunes da Silva","periodico":"REVISTA ESPAÇO PEDAGÓGICO","qualis":"A3","area":"Educação","temas":["Argumentação","Metacognição e Autorregulação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.5335/rep.v30i0.14823","doi":"10.5335/rep.v30i0.14823","resumo":"Em função da pandemia da COVID19, o ensino remoto exigiu dos educadores grande capacidade de desenho pedagógico, isto é, capacidade de adaptar estratégias pedagógicas já existentes para novos contextos de ensino-aprendizagem. O processo de adaptação de uma disciplina de Argumentação na Educação, do formato presencial para o remoto, envolveu o exercício dessa capacidade de design de uma professora e suas monitoras. O desafio enfrentado nessa transposição era manter, no formato remoto, a potencialidade argumentativa das estratégias realizadas presencialmente, o que parece exigir um funcionamento metacognitivo contínuo. Diálogos desse grupo foram analisados e a presença de movimentos de monitoramento do pensamento mantenedor, elaborador e reconstrutor, foram uma constante. É possível, pois, admitirmos que a necessidade de adequação das estratégias pedagógicas, do formato presencial para o remoto, exigido por um momento de crise sanitária, propiciou um ambiente autorreflexivo propício tanto ao desenvolvimento metacognitivo como da capacidade de desenho pedagógico argumentativo das educadoras."},{"ano":2022,"titulo":"A argumentação e o desenvolvimento do pensamento crítico na construção de caminhos para mitigação de problemas ambientais da cidade de Bonito-PE","autores":"Jose Ayron Lira dos Anjos","estudantes":"Paula Eduarda Nunes da Silva","periodico":"REVISTA DE ENSINO DE CIÊNCIAS E MATEMÁTICA (RENCIMA)","qualis":"A1","area":"Educação","temas":["Argumentação","Metodologias Ativas e Tecnologia","Pensamento Crítico e Reflexivo","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.26843/rencima.v13n4a21","doi":"10.26843/rencima.v13n4a21","resumo":"Problemas socioambientais é uma temática emergente que necessita ser debatida em sala de aula. Em uma cidade turística, onde os problemas ambientais são pouco discutidos, propomos trazer uma análise do processo de argumentação, voltada ao desenvolvimento do pensamento crítico dos estudantes, instigados pela discussão dos problemas ambientais percebidos por estes em sua cidade. Nesse contexto, realizou-se análise das argumentações expostas pelos discentes durante a apresentação das propostas de solução para os problemas socioambientais trabalhados. A metodologia utilizada foi da Aprendizagem Baseada em Problemas para instigar a emergência do processo argumentativo, de forma que os discentes apresentassem seu ponto de vista e propostas de solução para os problemas identificados. Percebemos em decorrência do processo, a remodelação das ideias, decorrente da organização de argumentos fundamentados cientificamente e construídos colaborativamente entre os estudantes, o que nos remete a indícios do desenvolvimento do pensamento crítico."},{"ano":2022,"titulo":"Avaliação da aprendizagem por parâmetros ausubelianos após vivência em uma unidade de ensino potencialmente significativa","autores":"José Antônio Bezerra de Oliveira","estudantes":[],"periodico":"REVISTA ESPAÇO PEDAGÓGICO","qualis":"A3","area":"Educação","temas":["Aprendizagem Significativa","Avaliação e Trajetórias"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.5335/rep.v29i2.13114","doi":"10.5335/rep.v29i2.13114","resumo":"Percursos didáticos que se amparem em perspectivas construtivistas de aprendizagem são caminhos aspirados desde o final do século XX pelos estudiosos em educação. Outrossim, o processo avaliativo é um movimento complexo que demanda do professor certo esforço na busca por evidências da consolidação da aprendizagem. Posto isto, na perspectiva de uma aprendizagem significativa, este estudo apresenta uma proposta de Unidade de Ensino Potencialmente Significativa (UEPS) para a educação básica, além de uma sugestão para avaliar, por meio de parâmetros ausubelianos práticos, uma possível aprendizagem significativa que possa se desenvolver a partir da aplicação da Unidade. Para a avaliação do aprendizado com significado de forma mais assertiva, sugere-se a análise de critérios e itens que abarquem os domínios cognitivo, atitudinal, ciente, consciente e contextual da aprendizagem, utilizando múltiplos instrumentos avaliativos. Desta forma, as propostas aqui discutidas constituem-se como um recurso para subsidiar a análise e entendimento acerca dos episódios de aprendizagem significativa."},{"ano":2022,"titulo":"Como estudantes de Licenciatura em Matemática justificam problemas geométricos a partir de provas visuais?","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"REVISTA BRASILEIRA DE ENSINO DE CIÊNCIA E TECNOLOGIA","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Metodologia de Pesquisa","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.3895/rbect.v15n3.15688","doi":"10.3895/rbect.v15n3.15688","resumo":"O objetivo deste artigo é investigar como estudantes de Licenciatura em Matemática justificam problemas geométricos a partir de provas visuais. Apesar do aumento no número de trabalhos de pesquisa em argumentação e provas no ensino de Matemática, observa-se que atividades desta natureza não são comuns na Educação Básica. Em outras palavras, grande parte dos professores que ensina Matemática não costuma pedir que seus alunos justifiquem as resoluções de tarefas ou os raciocínios utilizados. Em particular, não exploram atividades que desenvolvam a visualização na resolução de problemas ou justificativas para afirmativas de propriedades matemáticas. A visualização constitui um componente importante na compreensão de um conceito ou de um problema geométrico, e pode contribuir para esse desenvolvimento. Visualizar um problema significa compreendê-lo em termos de uma imagem visual (mental), constituindo uma parte essencial do método de solução. O percurso metodológico utilizado nesta pesquisa qualitativa foi o envio de um questionário online, elaborado no Google Forms, com três problemas caracterizados por provas visuais para licenciandos de Matemática de diversas Instituições de Ensino Superior. Por meio deste procedimento de coleta, a amostra por conveniência abrangeu 58 estudantes e as respostas foram analisadas de acordo com uma análise textual. Os dados indicam que, ao mobilizarem a visualização, embora os licenciandos consigam apresentar um encadeamento lógico em uma argument"},{"ano":2022,"titulo":"Descripción del conocimiento pedagógico del contenido de la argumentación en docentes que enseñan ciencias naturales en educación pública en Chile","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"REVISTA EUREKA SOBRE ENSEÑANZA Y DIVULGACIÓN DE LAS CIENCIAS","qualis":"A1","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Espanhol","link":"https://doi.org/10.25267/rev_eureka_ensen_divulg_cienc.2022.v19.i1.1602","doi":"10.25267/rev_eureka_ensen_divulg_cienc.2022.v19.i1.1602","resumo":"Science teaching has been called to contribute to citizenship insofar as it requires scientific competencies such as articulating theory and evidence, and the critical evaluation of different points of view. To promote argumentation in science teaching is key but not simple and requires teachers' pedagogical content knowledge (PCK) of argumentation. International literature has reported low PCK of argumentation in science teachers, but we scarcely know about this in Spanish speaking countries. is paper reports a study aimed at describing the PCK of argumentation on 10 primary science teachers in Chile. Lessons were video recorded, and interviews were conducted. Results show low PCK of argumentation overall, and declarative PCK does not necessarily relates with procedimental PCK. Moreover, different configurations of the dimensions of PCK of argumentation were observed, suggesting that there is not one possible learning progression, but different ones. Educational and scientific implications are discussed."},{"ano":2022,"titulo":"Formação crítico-reflexiva nos estágios em psicologia no Brasil: uma revisão de literatura narrativa","autores":["Gabriel Fortes Cavalcanti de Macêdo","Nádia Oliveira da Silva"],"estudantes":[],"periodico":"REVISTA SUL AMERICANA DE PSICOLOGIA","qualis":"B2","area":"Psicologia","temas":["Formação de Professores","Pensamento Crítico e Reflexivo","Psicologia e Subjetividade","Desenvolvimento e Linguagem"],"disciplina":[],"tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.29344/2318650x.1.3104","doi":"10.29344/2318650x.1.3104","resumo":"Através de uma revisão de literatura narrativa, esse artigo investiga se as práticas didático-pedagógicas utilizadas na formação dos estágios específicos em psicologia fomentam a habilidade crítico-reflexiva, conforme as recomendações das diretrizes curriculares do curso. Foi utilizada a base de dados Scielo e os descritores: “formação profissional em psicologia”, “supervisão de estágio em psicologia” e “estágio supervisionado em psicologia”. Analisou-se dezoito artigos após a utilização dos critérios de inclusão e exclusão adotados. Todo o corpus consiste em estudos qualitativos de natureza descritiva. Não foi identificado o impacto que esses recursos apresentam no desenvolvimento de competências profissionais, sendo necessários estudos empíricos nesse campo."},{"ano":2022,"titulo":"INTERPRETANDO E AVALIANDO ARGUMENTAÇÕES: UMA ANÁLISE COM LICENCIANDOS INGRESSANTES DE MATEMÁTICA","autores":"João Carlos Caldato Correia","estudantes":[],"periodico":"VIDYA (SANTA MARIA. ONLINE)","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":["Argumentação","Formação de Professores","Desenvolvimento e Linguagem","Avaliação e Trajetórias","Ensino de Ciências e Matemática"],"disciplina":"Matemática","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.37781/vidya.v42i2.4208","doi":"10.37781/vidya.v42i2.4208","resumo":"Este artigo apresenta a primeira parte de uma pesquisa ampla, cuja segunda etapa está em andamento. O objetivo é analisar nove argumentos sobre a soma dos ângulos internos de um triângulo à luz do referencial teórico e investigar como licenciandos ingressantes em Matemática interpretam e avaliam tais argumentações, sob três pontos de vista distintos. Inicialmente, os participantes deveriam se colocar no lugar de um professor para avaliar cada um dos nove argumentos apresentados; em seguida, responder se eles utilizariam alguns em suas aulas. Por fim, eles deveriam responder se adotariam algum dos argumentos ao realizar um teste no Ensino Superior. Os resultados evidenciaram uma preferência pelos argumentos formais, e indicaram que a simples aparência de uma resposta associada à linguagem algébrica, às vezes, é suficiente para convencê-los, ainda que logicamente contraditória. A segunda etapa da pesquisa, pretende investigar o posicionamento dos mesmos sujeitos, agora licenciandos concluintes."},{"ano":2022,"titulo":"Investigating Programming Students Problem Comprehension Ability and Its Association With Learning Performance","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"IEEE TRANSACTIONS ON EDUCATION","qualis":"A2","area":"Ensino (Ciências/Exatas)","temas":"Ensino de Ciências e Matemática","disciplina":"Computação","tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.1109/te.2022.3204906","doi":"10.1109/te.2022.3204906","resumo":"Contribution: Students’ problem-understanding abilities and their relationship with programming learning were investigated using a methodology little explored in the existing literature. Background: Problem comprehension is an ability used during software development. Current research points to conflicting results on students’ ability to interpret problems, which calls for further research. In addition, the influence of this skill in programming learning also deserves additional studies. Research Questions: The following research questions were developed: RQ1) Can introductory programming students correctly interpret the statement of programming questions? RQ2) Is the student’s problem comprehension ability associated with creating correct programs? Methodology: Forty-eight students enrolled in an online introductory programming course participated in the investigation. Students’ problem-understanding externalizations were analyzed, and statistical tests were performed to assess the association of this ability with programming learning performance. Findings: Most students externalized a satisfactory degree of problem-understanding competency. The cases in which students’ misinterpreted the problem were associated with creating faulty software. However, a closer analysis suggests that there are other factors that must also be considered."},{"ano":2022,"titulo":"METACOGNIÇÃO EM ESTRATÉGIA AUTORREGULATÓRIA NA RESOLUÇÃO DE PROBLEMAS EM FÍSICA","autores":["Gabriel Fortes Cavalcanti de Macêdo","Kátia Calligaris Rodrigues"],"estudantes":[],"periodico":"CAMINHOS DA EDUCAÇÃO MATEMÁTICA EM REVISTA","qualis":"A4","area":"Educação","temas":"Metacognição e Autorregulação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Não informado","link":"https://periodicos.ifs.edu.br/index.php/caminhos_da_educacao_matematica/article/view/1404/1379","doi":"","resumo":""},{"ano":2022,"titulo":"Movimentos discursivos da argumentação e processos cognitivos da aprendizagem significativa no mapeamento conceitual","autores":["Kátia Calligaris Rodrigues","Sylvia Regina de Chiaro Ribeiro Rodrigues"],"estudantes":[],"periodico":"EID","qualis":"A2","area":"Educação","temas":["Argumentação","Aprendizagem Significativa","Formação de Professores","Desenvolvimento e Linguagem","Ensino de Ciências e Matemática"],"disciplina":"Física","tipo":"Empírico/Prático","idioma":"Português","link":"https://doi.org/10.47369/eidea-22-1-3345","doi":"10.47369/eidea-22-1-3345","resumo":"A argumentação é uma organização discursiva específica em que movimentos de justificação e negociação de perspectivas são observados. Por outro lado, a negociação de ideias também é marca da aprendizagem significativa, caracterizada pela ocorrência dos processos cognitivos de diferenciação progressiva e reconciliação integrativa. Esse artigo é parte de um estudo que se propôs a investigar a relação entre os movimentos discursivos da argumentação e os processos cognitivos da aprendizagem significativa no decurso de mapeamentos conceituais. Observamos a elaboração de mapas conceituais por dois estudantes de licenciatura em física do Centro Acadêmico do Agreste da Universidade Federal de Pernambuco em duas situações distintas: 1) na elaboração de mapas conceituais individuais e 2) na elaboração de um mapa conceitual coletivo. Essas observações foram videogravadas, transcritas e analisadas. A partir delas, encontramos indícios de que os movimentos discursivos da argumentação têm o potencial de evocar e manter os processos cognitivos da aprendizagem significativa."},{"ano":2022,"titulo":"Prejudice in visual argument","autores":"Gabriel Fortes Cavalcanti de Macêdo","estudantes":[],"periodico":"EID","qualis":"A2","area":"Educação","temas":"Argumentação","disciplina":[],"tipo":"Empírico/Prático","idioma":"Inglês","link":"https://doi.org/10.47369/eidea-22-2-3434","doi":"10.47369/eidea-22-2-3434","resumo":"This article discusses different types of “argumentativeness” in three memes related to overweight jokes posted in a community of meme generation (quickmeme.com) in July 2021. We aim to show how visual argument, image rhetoric, and social prejudice devices enable the creation of “joking” memes that frame an audience's meaning-making towards prejudiced ideas. The methodological procedure was based on an analytical process of the selected memes using a theoretical framework on visual argumentation, media studies, and attitudes and beliefs around
